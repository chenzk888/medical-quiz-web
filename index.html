<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>医学资格考证平台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "Microsoft YaHei", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 100px;
    }

    /* 顶部进度条（快速模式用） */
    .fast-timer {
      position: fixed;
      top: 0;
      left: 0;
      height: 4px;
      background: #ff3b30;
      z-index: 1000;
      transition: width 0.1s linear;
    }

    /* 顶部导航 */
    .top-nav {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid #e8e8ed;
      padding: 12px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .exam-tabs {
      display: flex;
      gap: 8px;
      padding: 0 16px;
      min-width: max-content;
    }

    .exam-tab {
      padding: 8px 16px;
      border-radius: 16px;
      border: none;
      background: #f5f5f7;
      color: #1d1d1f;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .exam-tab.active {
      background: #0071e3;
      color: #fff;
    }

    /* 主布局 */
    .main-layout {
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* 左侧科目导航 - 桌面端 */
    .sidebar {
      width: 260px;
      background: #fff;
      border-right: 1px solid #e8e8ed;
      padding: 20px 0;
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
      color: #86868b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 20px 12px;
    }

    .subject-list {
      list-style: none;
    }

    .subject-item {
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      border-left: 3px solid transparent;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
    }

    .subject-item.active {
      background: #f5f5f7;
      border-left-color: #0071e3;
    }

    .subject-count {
      font-size: 11px;
      color: #86868b;
      background: #f5f5f7;
      padding: 2px 6px;
      border-radius: 8px;
    }

    .subject-item.active .subject-count {
      background: #0071e3;
      color: #fff;
    }

    /* 右侧内容区 */
    .content {
      flex: 1;
      padding: 24px;
      max-width: 800px;
    }

    /* 每日任务卡片 */
    .daily-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(102,126,234,0.3);
    }

    .daily-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .daily-title {
      font-size: 18px;
      font-weight: 700;
    }

    .daily-streak {
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
    }

    .task-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }

    .task-item.completed .task-checkbox {
      background: #34c759;
      border-color: #34c759;
    }

    /* 模式切换器 */
    .mode-switcher {
      display: flex;
      gap: 8px;
      padding: 12px 0;
      margin-bottom: 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .mode-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 2px solid #e8e8ed;
      background: #fff;
      color: #666;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .mode-btn.active {
      background: #0071e3;
      color: #fff;
      border-color: #0071e3;
      box-shadow: 0 4px 12px rgba(0,113,227,0.3);
    }

    /* 手机端科目选择器 */
    .mobile-subject-selector {
      background: #fff;
      padding: 12px 16px;
      margin-bottom: 16px;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .mobile-subject-label {
      font-size: 12px;
      color: #86868b;
      margin-bottom: 8px;
    }

    .mobile-subject-list {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .mobile-subject-item {
      padding: 8px 16px;
      border-radius: 20px;
      background: #f5f5f7;
      color: #1d1d1f;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
      border: none;
      flex-shrink: 0;
    }

    .mobile-subject-item.active {
      background: #0071e3;
      color: #fff;
    }

    /* 科目标题 */
    .subject-header {
      margin-bottom: 20px;
    }

    .subject-title {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }

    .subject-meta {
      font-size: 15px;
      color: #86868b;
    }

    /* 进度卡片 */
    .progress-card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .progress-title {
      font-size: 14px;
      color: #86868b;
    }

    .progress-value {
      font-size: 20px;
      font-weight: 600;
      color: #0071e3;
    }

    .progress-bar {
      height: 6px;
      background: #e8e8ed;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #0071e3, #42a5f5);
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    /* 题目卡片 */
    .question-card {
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 20px;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .question-card.sliding-left {
      transform: translateX(-100%);
      opacity: 0;
    }

    .question-card.sliding-right {
      transform: translateX(100%);
      opacity: 0;
    }

    /* 背题模式 */
    .memory-mode .analysis-section {
      display: block !important;
      background: #fff9e6;
      border-left-color: #ffc107;
    }

    .memory-mode .options {
      pointer-events: none;
      opacity: 0.6;
    }

    .question-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .meta-tag {
      padding: 4px 10px;
      border-radius: 10px;
      background: #f5f5f7;
      color: #86868b;
      font-size: 11px;
      font-weight: 500;
    }

    .meta-tag.chapter {
      background: #e8f5e9;
      color: #34c759;
    }

    .meta-tag.year {
      background: #e3f2fd;
      color: #0071e3;
    }

    .question-text {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 20px;
      color: #1d1d1f;
    }

    /* 选项 */
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-btn {
      padding: 16px;
      border-radius: 12px;
      border: 1px solid #e8e8ed;
      background: #fff;
      color: #1d1d1f;
      font-size: 15px;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 56px;
    }

    .option-btn:active {
      transform: scale(0.98);
      background-color: #f0f7ff;
    }

    .option-btn.selected {
      background: #0071e3;
      color: #fff;
      border-color: #0071e3;
      box-shadow: 0 0 0 3px rgba(0,113,227,0.1);
    }

    .option-btn.correct {
      background: #34c759;
      color: #fff;
      border-color: #34c759;
      animation: correctPop 0.4s ease;
    }

    .option-btn.wrong {
      background: #ff3b30;
      color: #fff;
      border-color: #ff3b30;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    @keyframes correctPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    .option-letter {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .option-btn.selected .option-letter,
    .option-btn.correct .option-letter,
    .option-btn.wrong .option-letter {
      background: rgba(255,255,255,0.3);
    }

    /* 结果提示 */
    .result {
      margin: 16px 0;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      display: none;
    }

    .result.correct {
      background: #e8f5e9;
      color: #34c759;
      display: block;
    }

    .result.wrong {
      background: #ffebee;
      color: #ff3b30;
      display: block;
    }

    /* 评论区 - 默认隐藏，答完题显示 */
    .comment-section {
      margin-top: 20px;
      border-top: 1px solid #e8e8ed;
      padding-top: 16px;
      display: none; /* 默认隐藏 */
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .comment-title {
      font-weight: 600;
      margin-bottom: 12px;
      color: #1d1d1f;
      font-size: 16px;
    }

    .comment-item {
      padding: 12px;
      background: #f8f9fa;
      border-radius: 12px;
      margin-bottom: 10px;
      font-size: 14px;
      line-height: 1.5;
      transition: transform 0.2s;
    }

    .comment-item:active {
      transform: scale(0.98);
    }

    .comment-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      color: #666;
      font-size: 12px;
    }

    .comment-author {
      color: #0071e3;
      font-weight: 600;
    }

    .comment-likes {
      color: #ff6b6b;
      cursor: pointer;
      user-select: none;
    }

    .comment-likes.liked {
      color: #ff3b30;
      font-weight: 600;
    }

    /* 解析区域 */
    .analysis-section {
      background: #f8f9fa;
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
      border-left: 4px solid #0071e3;
      display: none;
    }

    .analysis-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .analysis-icon {
      font-size: 20px;
    }

    .analysis-title {
      font-size: 16px;
      font-weight: 600;
      color: #0071e3;
    }

    .analysis-content {
      font-size: 15px;
      line-height: 1.7;
      color: #1d1d1f;
      margin-bottom: 16px;
    }

    .key-point {
      padding: 16px;
      background: #fff;
      border-radius: 12px;
      font-size: 14px;
      color: #5f6368;
      border: 1px solid #e8e8ed;
    }

    .key-point-label {
      color: #34c759;
      font-weight: 600;
      margin-bottom: 4px;
    }

    /* AI 解析按钮 */
    .ai-section {
      margin-top: 20px;
      display: none;
    }

    .ai-btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #0071e3, #42a5f5);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 12px rgba(0,113,227,0.3);
    }

    .ai-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .ai-btn.loading {
      background: #86868b;
    }

    /* API Key 输入 */
    .api-section {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .api-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #1d1d1f;
    }

    .api-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #e8e8ed;
      font-size: 15px;
      margin-bottom: 12px;
      font-family: monospace;
    }

    .api-input:focus {
      outline: none;
      border-color: #0071e3;
    }

    .api-hint {
      font-size: 13px;
      color: #86868b;
      line-height: 1.5;
    }

    /* 操作按钮 */
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 14px 20px;
      border-radius: 14px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: #1d1d1f;
      color: #fff;
    }

    .btn-secondary {
      background: #f5f5f7;
      color: #1d1d1f;
    }

    /* 底部工具栏 */
    .toolbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(20px);
      border-top: 1px solid #e8e8ed;
      padding: 12px 20px;
      display: flex;
      justify-content: space-around;
      z-index: 100;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }

    .toolbar-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      border: none;
      background: transparent;
      color: #86868b;
      font-size: 11px;
      cursor: pointer;
    }

    .toolbar-btn.active {
      color: #0071e3;
    }

    .toolbar-icon {
      font-size: 24px;
    }

    /* 粒子效果 */
    .particle {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      animation: particle-fly 0.6s ease-out forwards;
      z-index: 9999;
    }

    @keyframes particle-fly {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--tx), var(--ty)) scale(0);
        opacity: 0;
      }
    }

    /* 测试模式答题卡 */
    .test-summary {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.98);
      z-index: 1000;
      padding: 40px 20px;
      overflow-y: auto;
      display: none;
    }

    .test-summary.show {
      display: block;
    }

    .summary-title {
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 30px;
    }

    .summary-score {
      font-size: 64px;
      font-weight: 700;
      text-align: center;
      color: #0071e3;
      margin-bottom: 10px;
    }

    .summary-info {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
    }

    /* 手机端适配 */
    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }
      
      .content {
        padding: 16px;
        max-width: 100%;
      }
      
      .subject-title {
        font-size: 24px;
      }
      
      .question-card {
        padding: 20px;
      }
      
      .question-text {
        font-size: 17px;
      }
    }

    @media (min-width: 769px) {
      .mobile-subject-selector {
        display: none;
      }
    }
  </style>
</head>
<body>
  <!-- 快速模式计时条 -->
  <div class="fast-timer" id="fastTimer" style="display: none;"></div>

  <!-- 测试模式结果页 -->
  <div class="test-summary" id="testSummary">
    <div class="summary-title">📝 测试报告</div>
    <div class="summary-score" id="summaryScore">0</div>
    <div class="summary-info" id="summaryInfo">正确率 0%</div>
    <button class="btn btn-primary" onclick="closeTestSummary()" style="max-width: 300px; margin: 0 auto; display: block;">查看详细解析</button>
  </div>

  <!-- 顶部考试类型选择 -->
  <nav class="top-nav">
    <div class="exam-tabs" id="examTabs">
      <button class="exam-tab active" onclick="selectExam('全部')">全部</button>
      <button class="exam-tab" onclick="selectExam('临床执业医师')">临床执业医师</button>
      <button class="exam-tab" onclick="selectExam('临床医学考研')">临床医学考研</button>
      <button class="exam-tab" onclick="selectExam('护师资格考试')">护师资格考试</button>
    </div>
  </nav>

  <!-- 主布局 -->
  <div class="main-layout">
    <!-- 左侧科目导航 - 桌面端 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title">选择科目</div>
      <ul class="subject-list" id="subjectList"></ul>
    </aside>

    <!-- 右侧内容区 -->
    <main class="content">
      <!-- 每日任务卡片 -->
      <div class="daily-card" id="dailyCard">
        <div class="daily-header">
          <div class="daily-title">📅 今日学习打卡</div>
          <div class="daily-streak" id="streakDays">🔥 连续 1 天</div>
        </div>
        <div class="task-list">
          <div class="task-item" id="task1">
            <div class="task-checkbox">✓</div>
            <span id="task1Text">刷题 20 道（已完成 0）</span>
          </div>
          <div class="task-item" id="task2">
            <div class="task-checkbox"></div>
            <span>复习错题 10 道</span>
          </div>
          <div class="task-item" id="task3">
            <div class="task-checkbox"></div>
            <span>薄弱点专项训练</span>
          </div>
        </div>
      </div>

      <!-- 模式切换器 -->
      <div class="mode-switcher" id="modeSwitcher">
        <button class="mode-btn active" onclick="switchMode('practice')" data-mode="practice">
          ✏️ 练习模式
        </button>
        <button class="mode-btn" onclick="switchMode('fast')" data-mode="fast">
          ⚡ 快速模式
        </button>
        <button class="mode-btn" onclick="switchMode('test')" data-mode="test">
          📝 测试模式
        </button>
        <button class="mode-btn" onclick="switchMode('memory')" data-mode="memory">
          🧠 背题模式
        </button>
      </div>

      <!-- 手机端科目选择器 -->
      <div class="mobile-subject-selector" id="mobileSubjectSelector">
        <div class="mobile-subject-label">选择科目</div>
        <div class="mobile-subject-list" id="mobileSubjectList"></div>
      </div>

      <!-- 科目标题 -->
      <header class="subject-header" id="subjectHeader">
        <h1 class="subject-title">全部科目</h1>
        <p class="subject-meta">共 158 道题</p>
      </header>

      <!-- 进度卡片 -->
      <div class="progress-card">
        <div class="progress-header">
          <span class="progress-title">当前进度</span>
          <span class="progress-value" id="progressText">1 / 158</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0.8%"></div>
        </div>
      </div>

      <!-- 题目卡片 -->
      <div class="question-card" id="questionCard">
        <div class="question-meta" id="questionMeta"></div>
        <div class="question-text" id="questionText">加载中...</div>
        <div class="options" id="options"></div>
        <div class="result" id="result"></div>
        
        <!-- AI 解析按钮 -->
        <div class="ai-section" id="aiSection">
          <button class="ai-btn" id="aiBtn" onclick="getAIAnalysis()">
            <span>🤖</span>
            <span>获取 AI 解析</span>
          </button>
        </div>

        <!-- 解析区域 -->
        <div class="analysis-section" id="analysisSection">
          <div class="analysis-header">
            <span class="analysis-icon">💡</span>
            <span class="analysis-title">答案解析</span>
          </div>
          <div class="analysis-content" id="analysisContent"></div>
          <div class="key-point" id="keyPoint"></div>
        </div>

        <!-- 评论区 - 默认隐藏，答完题显示 -->
        <div class="comment-section" id="commentSection">
          <div class="comment-title">💡 学霸记忆口诀（点赞收藏）</div>
          <div id="commentsList"></div>
        </div>

        <!-- 操作按钮 -->
        <div class="actions">
          <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">下一题</button>
          <button class="btn btn-secondary" id="favoriteBtn" onclick="toggleFavorite()">☆ 收藏</button>
        </div>
      </div>

      <!-- API Key 输入 -->
      <div class="api-section" id="apiSection">
        <div class="api-title">DeepSeek API Key</div>
        <input type="password" class="api-input" id="apiKeyInput" placeholder="输入 API Key，例如 sk-...">
        <div class="api-hint">
          输入 API Key 后可使用 AI 解析功能。Key 仅保存在本地浏览器中。
        </div>
      </div>
    </main>
  </div>

  <!-- 底部工具栏 -->
  <div class="toolbar">
    <button class="toolbar-btn" onclick="showWrongBook()">
      <span class="toolbar-icon">📚</span>
      <span>错题本</span>
    </button>
    <button class="toolbar-btn" onclick="resetProgress()">
      <span class="toolbar-icon">↺</span>
      <span>重置</span>
    </button>
    <button class="toolbar-btn" onclick="validateQuestions()">
      <span class="toolbar-icon">✓</span>
      <span>自检</span>
    </button>
  </div>

  <script src="questions/临床执业医师/questions.js"></script>
  <script src="questions/临床医学考研/questions.js"></script>
  <script src="questions/护师资格考试/questions.js"></script>
  <script src="questions.js"></script>
  <script>
    // ========== 全局状态 ==========
    const questions = window.questions || [];
    let currentExam = '全部';
    let currentSubject = '全部';
    let currentIndex = 0;
    let filteredQuestions = [];
    let currentQuestion = null;
    let hasAnswered = false;
    let currentMode = 'practice';
    let fastTimer = null;
    let fastTimeLeft = 30;
    let testAnswers = [];
    let dailyProgress = {
      completed: 0,
      wrongReviewed: 0,
      weakPointDone: false
    };

    // ========== 初始化 ==========
    function init() {
      if (questions.length === 0) {
        document.getElementById('questionText').textContent = '题库加载失败，请检查 questions/ 分文件与根目录 questions.js 是否齐全';
        return;
      }
      
      // 恢复 API Key
      const savedKey = localStorage.getItem('medicalQuiz_apiKey');
      if (savedKey) {
        document.getElementById('apiKeyInput').value = savedKey;
      }
      
      document.getElementById('apiKeyInput').addEventListener('input', (e) => {
        localStorage.setItem('medicalQuiz_apiKey', e.target.value);
      });
      
      // 检查每日任务
      checkDailyTasks();
      
      // 恢复模式偏好
      const savedMode = localStorage.getItem('preferredMode');
      if (savedMode) {
        currentMode = savedMode;
        document.querySelectorAll('.mode-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.mode === savedMode);
        });
      }
      
      filterQuestions();
      renderSubjectList();
      renderMobileSubjectList();
      renderQuestion();
      initTouchEvents();
    }

    // ========== 每日任务系统 ==========
    function checkDailyTasks() {
      const today = new Date().toDateString();
      const lastCheck = localStorage.getItem('lastCheckDate');
      
      if (lastCheck !== today) {
        dailyProgress = { completed: 0, wrongReviewed: 0, weakPointDone: false };
        localStorage.setItem('dailyProgress', JSON.stringify(dailyProgress));
        localStorage.setItem('lastCheckDate', today);
        
        const lastDate = new Date(lastCheck);
        const diffDays = Math.floor((new Date() - lastDate) / (1000 * 60 * 60 * 24));
        let streak = parseInt(localStorage.getItem('streakDays') || '0');
        if (diffDays === 1) {
          streak++;
        } else if (diffDays > 1) {
          streak = 1;
        }
        localStorage.setItem('streakDays', streak);
      } else {
        dailyProgress = JSON.parse(localStorage.getItem('dailyProgress') || '{}');
      }
      
      updateTaskDisplay();
    }

    function updateTaskDisplay() {
      const streak = localStorage.getItem('streakDays') || '1';
      document.getElementById('streakDays').textContent = `🔥 连续 ${streak} 天`;
      
      const task1 = document.getElementById('task1');
      if (dailyProgress.completed >= 20) {
        task1.classList.add('completed');
        task1.querySelector('.task-checkbox').textContent = '✓';
      }
      document.getElementById('task1Text').textContent = 
        `刷题 20 道（已完成 ${dailyProgress.completed}）`;
    }

    function updateDailyProgress() {
      dailyProgress.completed++;
      localStorage.setItem('dailyProgress', JSON.stringify(dailyProgress));
      updateTaskDisplay();
    }

    // ========== 模式切换系统 ==========
    function switchMode(mode) {
      currentMode = mode;
      localStorage.setItem('preferredMode', mode);
      
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });
      
      if (fastTimer) {
        clearInterval(fastTimer);
        document.getElementById('fastTimer').style.display = 'none';
      }
      
      if (mode === 'test') {
        testAnswers = [];
        alert('📝 测试模式：共20题，做完统一出分，中途不能查看答案');
      }
      
      renderQuestion();
    }

    function startFastTimer() {
      if (currentMode !== 'fast') return;
      
      const timerBar = document.getElementById('fastTimer');
      timerBar.style.display = 'block';
      timerBar.style.width = '100%';
      fastTimeLeft = 30;
      
      fastTimer = setInterval(() => {
        fastTimeLeft--;
        timerBar.style.width = (fastTimeLeft / 30 * 100) + '%';
        
        if (fastTimeLeft <= 0) {
          clearInterval(fastTimer);
          if (!hasAnswered) {
            selectOption(0);
            setTimeout(() => nextQuestion(), 1000);
          }
        }
      }, 1000);
    }

    // ========== 题目筛选与渲染 ==========
    function filterQuestions() {
      filteredQuestions = questions.filter(q => {
        const matchExam = currentExam === '全部' || q.examType === currentExam;
        const matchSubject = currentSubject === '全部' || q.subject === currentSubject;
        return matchExam && matchSubject;
      });
    }

    function selectExam(exam) {
      currentExam = exam;
      currentSubject = '全部';
      currentIndex = 0;
      
      document.querySelectorAll('.exam-tab').forEach(tab => {
        tab.classList.toggle('active', tab.textContent === exam);
      });
      
      filterQuestions();
      renderSubjectList();
      renderMobileSubjectList();
      renderQuestion();
    }

    function renderSubjectList() {
      const subjects = ['全部'];
      const subjectCount = {};
      
      questions.forEach(q => {
        if (currentExam === '全部' || q.examType === currentExam) {
          if (!subjects.includes(q.subject)) subjects.push(q.subject);
          subjectCount[q.subject] = (subjectCount[q.subject] || 0) + 1;
        }
      });

      document.getElementById('subjectList').innerHTML = subjects.map(subject => `
        <li class="subject-item ${subject === currentSubject ? 'active' : ''}" 
            onclick="selectSubject('${subject}')">
          <span>${subject}</span>
          ${subject !== '全部' ? `<span class="subject-count">${subjectCount[subject] || 0}</span>` : ''}
        </li>
      `).join('');
    }

    function renderMobileSubjectList() {
      const subjects = ['全部'];
      questions.forEach(q => {
        if ((currentExam === '全部' || q.examType === currentExam) && !subjects.includes(q.subject)) {
          subjects.push(q.subject);
        }
      });

      document.getElementById('mobileSubjectList').innerHTML = subjects.map(subject => `
        <button class="mobile-subject-item ${subject === currentSubject ? 'active' : ''}" 
                onclick="selectSubject('${subject}')">${subject}</button>
      `).join('');
    }

    function selectSubject(subject) {
      currentSubject = subject;
      currentIndex = 0;
      renderSubjectList();
      renderMobileSubjectList();
      renderQuestion();
    }

    // ========== 核心：渲染题目 ==========
    function renderQuestion() {
      if (filteredQuestions.length === 0) {
        document.getElementById('questionCard').innerHTML = `
          <div style="text-align: center; padding: 60px 20px;">
            <div style="font-size: 48px; margin-bottom: 16px;">📚</div>
            <div style="font-size: 20px; font-weight: 600; margin-bottom: 8px;">暂无题目</div>
            <div style="color: #86868b;">该科目下暂时没有题目</div>
          </div>
        `;
        return;
      }

      currentQuestion = filteredQuestions[currentIndex];
      hasAnswered = false;
      
      const card = document.getElementById('questionCard');
      card.className = 'question-card' + (currentMode === 'memory' ? ' memory-mode' : '');
      
      const showAnalysis = currentMode === 'memory';
      
      card.innerHTML = `
        <div class="question-meta" id="questionMeta"></div>
        <div class="question-text" id="questionText"></div>
        <div class="options" id="options"></div>
        <div class="result" id="result" style="display: none;"></div>
        
        <div class="ai-section" id="aiSection" style="display: none;">
          <button class="ai-btn" id="aiBtn" onclick="getAIAnalysis()">
            <span>🤖</span>
            <span>获取 AI 解析</span>
          </button>
        </div>

        <div class="analysis-section" id="analysisSection" style="display: ${showAnalysis ? 'block' : 'none'};">
          <div class="analysis-header">
            <span class="analysis-icon">💡</span>
            <span class="analysis-title">答案解析</span>
          </div>
          <div class="analysis-content" id="analysisContent"></div>
          <div class="key-point" id="keyPoint"></div>
        </div>

        <!-- 评论区 - 默认隐藏 -->
        <div class="comment-section" id="commentSection" style="display: none;">
          <div class="comment-title">💡 学霸记忆口诀（点赞收藏）</div>
          <div id="commentsList"></div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">下一题</button>
          <button class="btn btn-secondary" id="favoriteBtn" onclick="toggleFavorite()">☆ 收藏</button>
        </div>
      `;

      // 更新标题
      document.getElementById('subjectHeader').innerHTML = `
        <h1 class="subject-title">${currentSubject === '全部' ? '全部科目' : currentSubject}</h1>
        <p class="subject-meta">${currentExam === '全部' ? '全部考试' : currentExam} · 共 ${filteredQuestions.length} 道题</p>
      `;

      // 更新进度
      document.getElementById('progressText').textContent = `${currentIndex + 1} / ${filteredQuestions.length}`;
      document.getElementById('progressFill').style.width = `${((currentIndex + 1) / filteredQuestions.length * 100)}%`;

      // 题目内容
      document.getElementById('questionMeta').innerHTML = `
        <span class="meta-tag">ID: ${currentQuestion.id}</span>
        <span class="meta-tag chapter">${currentQuestion.chapter || '综合'}</span>
        ${currentQuestion.year ? `<span class="meta-tag year">${currentQuestion.year}年真题</span>` : ''}
        <span class="meta-tag">难度: ${'★'.repeat(currentQuestion.difficulty || 2)}</span>
      `;

      document.getElementById('questionText').textContent = currentQuestion.question;

      // 选项
      const optionsHtml = currentQuestion.options.map((opt, i) => `
        <button class="option-btn" onclick="selectOption(${i})" id="opt${i}">
          <span class="option-letter">${String.fromCharCode(65+i)}</span>
          <span>${opt}</span>
        </button>
      `).join('');
      document.getElementById('options').innerHTML = optionsHtml;
      
      // 背题模式直接显示解析
      if (currentMode === 'memory') {
        showLocalAnalysis();
      }
      
      // 快速模式启动计时
      if (currentMode === 'fast') {
        startFastTimer();
      }
    }

    // ========== 显示评论区（答完题调用） ==========
    function showComments() {
      const section = document.getElementById('commentSection');
      const list = document.getElementById('commentsList');
      
      // 获取当前题目的评论，如果没有就用默认的
      const comments = currentQuestion.comments || [
        { author: "@医学生", content: "这道题重点掌握临床表现和诊断标准", likes: 12 },
        { author: "@考证党", content: "历年真题常考，建议背下来", likes: 8 }
      ];
      
      list.innerHTML = comments.map((c, idx) => `
        <div class="comment-item">
          <div class="comment-header">
            <span class="comment-author">${c.author}</span>
            <span class="comment-likes" onclick="likeComment(this, ${idx})" data-idx="${idx}">❤️ ${c.likes}</span>
          </div>
          <div>${c.content}</div>
        </div>
      `).join('');
      
      // 显示评论区（带动画）
      section.style.display = 'block';
    }

    // ========== 点赞功能（防重复） ==========
    function likeComment(el, idx) {
      // 检查是否已点赞（用题目ID+评论索引作为key）
      const likeKey = `liked_${currentQuestion.id}_${idx}`;
      if (localStorage.getItem(likeKey)) {
        // 已点赞，再点取消
        localStorage.removeItem(likeKey);
        el.classList.remove('liked');
        const match = el.textContent.match(/\d+/);
        const current = match ? parseInt(match[0]) : 0;
        el.textContent = `❤️ ${current - 1}`;
        return;
      }
      
      // 未点赞，添加点赞
      localStorage.setItem(likeKey, 'true');
      el.classList.add('liked');
      const match = el.textContent.match(/\d+/);
      const current = match ? parseInt(match[0]) : 0;
      el.textContent = `❤️ ${current + 1}`;
      createParticles(event.clientX, event.clientY);
    }

    // ========== 核心：选择答案 ==========
    function selectOption(selected) {
      if (hasAnswered && currentMode !== 'test') return;
      hasAnswered = true;
      
      const correct = currentQuestion.answer;
      const buttons = document.querySelectorAll('.option-btn');
      
      // 震动反馈
      if (navigator.vibrate) navigator.vibrate(50);
      
      // 测试模式特殊处理
      if (currentMode === 'test') {
        testAnswers.push({
          question: currentQuestion,
          selected: selected,
          correct: selected === correct
        });
        
        buttons[selected].classList.add('selected');
        
        setTimeout(() => {
          if (currentIndex < filteredQuestions.length - 1 && testAnswers.length < 20) {
            nextQuestion();
          } else {
            showTestSummary();
          }
        }, 500);
        return;
      }
      
      // 普通模式：先显示选中
      buttons[selected].classList.add('selected');
      
      // 延迟显示结果（增加悬念）
      setTimeout(() => {
        // 显示正确答案
        buttons[correct].classList.add('correct');
        
        if (selected !== correct) {
          buttons[selected].classList.add('wrong');
          if (navigator.vibrate) navigator.vibrate([50, 100, 50]);
          saveWrongQuestion(currentQuestion);
        } else {
          if (navigator.vibrate) navigator.vibrate(30);
        }
        
        // 显示解析和结果
        const resultDiv = document.getElementById('result');
        resultDiv.className = `result ${selected === correct ? 'correct' : 'wrong'}`;
        resultDiv.innerHTML = selected === correct 
          ? '✅ 回答正确！' 
          : `❌ 回答错误，正确答案是 ${String.fromCharCode(65+correct)}`;
        resultDiv.style.display = 'block';
        
        document.getElementById('aiSection').style.display = 'block';
        showLocalAnalysis();
        
        // 关键：显示评论区（每道题不同口诀）
        showComments();
        
        // 快速模式自动下一题
        if (currentMode === 'fast') {
          setTimeout(() => nextQuestion(), 1500);
        }
      }, 300);
      
      // 粒子效果
      createParticles(event.clientX, event.clientY);
      
      // 更新每日进度
      updateDailyProgress();
    }

    function saveWrongQuestion(q) {
      let wrongs = JSON.parse(localStorage.getItem('wrongQuestions') || '[]');
      if (!wrongs.find(w => w.id === q.id)) {
        wrongs.push(q);
        localStorage.setItem('wrongQuestions', JSON.stringify(wrongs));
      }
    }

    function showLocalAnalysis() {
      document.getElementById('analysisSection').style.display = 'block';
      document.getElementById('analysisContent').innerHTML = `
        <p><strong>正确答案：${String.fromCharCode(65+currentQuestion.answer)}</strong></p>
        <p style="margin-top: 8px;">${currentQuestion.options[currentQuestion.answer]}</p>
      `;
      document.getElementById('keyPoint').innerHTML = `
        <div class="key-point-label">💡 考点提示</div>
        <div>${currentQuestion.keyPoint || '暂无解析，点击上方"获取 AI 解析"查看详细讲解'}</div>
      `;
    }

    // ========== AI 解析 ==========
    async function getAIAnalysis() {
      const apiKey = document.getElementById('apiKeyInput').value.trim();
      if (!apiKey) {
        alert('请先输入 DeepSeek API Key');
        document.getElementById('apiKeyInput').focus();
        return;
      }

      const btn = document.getElementById('aiBtn');
      btn.classList.add('loading');
      btn.disabled = true;
      btn.innerHTML = '<span>⏳</span><span>解析中...</span>';

      const optionsText = currentQuestion.options.map((opt, i) => 
        `${String.fromCharCode(65+i)}. ${opt}`
      ).join('\n');

      const prompt = `请解析这道医学题目：\n\n题目：${currentQuestion.question}\n\n选项：\n${optionsText}\n\n正确答案：${String.fromCharCode(65+currentQuestion.answer)}\n\n请提供详细的解析，包括：\n1. 为什么这个答案是正确的\n2. 其他选项为什么错误\n3. 相关知识点扩展`;

      try {
        const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: [
              { role: 'system', content: '你是医学考试辅导专家，擅长解析医学题目。' },
              { role: 'user', content: prompt }
            ],
            temperature: 0.7
          })
        });

        if (!response.ok) throw new Error('API 请求失败');

        const data = await response.json();
        const analysis = data.choices[0].message.content;

        document.getElementById('analysisContent').innerHTML = `
          <p><strong>🤖 AI 解析</strong></p>
          <div style="margin-top: 12px; white-space: pre-wrap;">${analysis}</div>
        `;
      } catch (error) {
        document.getElementById('analysisContent').innerHTML += `
          <p style="color: #ff3b30; margin-top: 12px;">❌ AI 解析失败：${error.message}</p>
        `;
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
        btn.innerHTML = '<span>🤖</span><span>重新获取 AI 解析</span>';
      }
    }

    // ========== 测试模式总结 ==========
    function showTestSummary() {
      const correct = testAnswers.filter(a => a.correct).length;
      const total = testAnswers.length;
      const score = Math.round((correct / total) * 100);
      
      document.getElementById('summaryScore').textContent = score;
      document.getElementById('summaryInfo').textContent = 
        `答对 ${correct} 题 / 共 ${total} 题 · 正确率 ${score}%`;
      document.getElementById('testSummary').classList.add('show');
      
      localStorage.setItem('lastTestScore', score);
    }

    function closeTestSummary() {
      document.getElementById('testSummary').classList.remove('show');
      currentMode = 'practice';
      switchMode('practice');
    }

    // ========== 导航功能 ==========
    function nextQuestion() {
      if (filteredQuestions.length === 0) return;
      
      const card = document.getElementById('questionCard');
      card.classList.add('sliding-left');
      
      setTimeout(() => {
        currentIndex = (currentIndex + 1) % filteredQuestions.length;
        renderQuestion();
        card.classList.remove('sliding-left');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 300);
    }

    function toggleFavorite() {
      const btn = document.getElementById('favoriteBtn');
      const isFav = btn.textContent.includes('★');
      btn.textContent = isFav ? '☆ 收藏' : '★ 已收藏';
      createParticles(event.clientX, event.clientY);
    }

    function showWrongBook() {
      const wrongs = JSON.parse(localStorage.getItem('wrongQuestions') || '[]');
      if (wrongs.length === 0) {
        alert('暂无错题记录，快去刷题吧！');
        return;
      }
      alert(`📚 错题本\n\n共记录 ${wrongs.length} 道错题`);
    }

    function resetProgress() {
      currentIndex = 0;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function validateQuestions() {
      const issues = [];
      const ids = new Set();
      
      questions.forEach((q, i) => {
        if (ids.has(q.id)) issues.push(`第${i+1}题 ID ${q.id} 重复`);
        ids.add(q.id);
        if (!Array.isArray(q.options) || q.options.length !== 4) {
          issues.push(`第${i+1}题 选项数量不对`);
        }
        if (q.answer < 0 || q.answer > 3) {
          issues.push(`第${i+1}题 答案索引错误`);
        }
      });
      
      if (issues.length === 0) {
        alert(`✅ 题库检查通过！\n\n共 ${questions.length} 道题，格式正确，无重复 ID。`);
      } else {
        alert(`⚠️ 发现 ${issues.length} 个问题：\n\n${issues.slice(0, 5).join('\n')}${issues.length > 5 ? '\n...' : ''}`);
      }
    }

    // ========== 视觉效果 ==========
    function createParticles(x, y) {
      const colors = ['#0071e3', '#42a5f5', '#34c759', '#ff9500'];
      for (let i = 0; i < 8; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        const size = Math.random() * 6 + 4;
        particle.style.cssText = `
          width: ${size}px;
          height: ${size}px;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          left: ${x}px;
          top: ${y}px;
        `;
        const angle = (Math.PI * 2 * i) / 8;
        const distance = Math.random() * 60 + 30;
        particle.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
        particle.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 600);
      }
    }

    // ========== 触摸滑动 ==========
    function initTouchEvents() {
      let touchStartX = 0;
      
      document.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
      }, {passive: true});
      
      document.addEventListener('touchend', (e) => {
        const touchEndX = e.changedTouches[0].screenX;
        const diff = touchStartX - touchEndX;
        
        if (Math.abs(diff) > 50 && diff > 0 && hasAnswered) {
          nextQuestion();
        }
      }, {passive: true});
      
      // 键盘快捷键
      document.addEventListener('keydown', (e) => {
        if (e.key >= '1' && e.key <= '4' && !hasAnswered) {
          selectOption(parseInt(e.key) - 1);
        }
        if (e.key === ' ' && hasAnswered) {
          e.preventDefault();
          nextQuestion();
        }
      });
    }

    // 启动
    init();
  </script>
</body>
</html>
