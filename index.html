<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>医学资格考证平台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "Microsoft YaHei", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 100px; /* 为底部工具栏留空间 */
    }

    /* 顶部导航 - 考试类型 */
    .top-nav {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid #e8e8ed;
      padding: 12px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .exam-tabs {
      display: flex;
      gap: 8px;
      padding: 0 16px;
      min-width: max-content;
    }

    .exam-tab {
      padding: 8px 16px;
      border-radius: 16px;
      border: none;
      background: #f5f5f7;
      color: #1d1d1f;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .exam-tab.active {
      background: #0071e3;
      color: #fff;
    }

    /* 主布局 */
    .main-layout {
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* 左侧科目导航 - 桌面端 */
    .sidebar {
      width: 260px;
      background: #fff;
      border-right: 1px solid #e8e8ed;
      padding: 20px 0;
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
      color: #86868b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 20px 12px;
    }

    .subject-list {
      list-style: none;
    }

    .subject-item {
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      border-left: 3px solid transparent;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
    }

    .subject-item.active {
      background: #f5f5f7;
      border-left-color: #0071e3;
    }

    .subject-count {
      font-size: 11px;
      color: #86868b;
      background: #f5f5f7;
      padding: 2px 6px;
      border-radius: 8px;
    }

    .subject-item.active .subject-count {
      background: #0071e3;
      color: #fff;
    }

    /* 右侧内容区 */
    .content {
      flex: 1;
      padding: 24px;
      max-width: 800px;
    }

    /* 科目标题 */
    .subject-header {
      margin-bottom: 20px;
    }

    .subject-title {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }

    .subject-meta {
      font-size: 15px;
      color: #86868b;
    }

    /* 进度卡片 */
    .progress-card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .progress-title {
      font-size: 14px;
      color: #86868b;
    }

    .progress-value {
      font-size: 20px;
      font-weight: 600;
      color: #0071e3;
    }

    .progress-bar {
      height: 6px;
      background: #e8e8ed;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #0071e3, #42a5f5);
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    /* 题目卡片 */
    .question-card {
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }

    .question-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .meta-tag {
      padding: 4px 10px;
      border-radius: 10px;
      background: #f5f5f7;
      color: #86868b;
      font-size: 11px;
      font-weight: 500;
    }

    .meta-tag.chapter {
      background: #e8f5e9;
      color: #34c759;
    }

    .meta-tag.year {
      background: #e3f2fd;
      color: #0071e3;
    }

    .question-text {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 20px;
      color: #1d1d1f;
    }

    /* 选项 */
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-btn {
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #e8e8ed;
      background: #fff;
      color: #1d1d1f;
      font-size: 15px;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .option-btn:active {
      transform: scale(0.98);
    }

    .option-btn.selected {
      background: #0071e3;
      color: #fff;
      border-color: #0071e3;
    }

    .option-btn.correct {
      background: #34c759;
      color: #fff;
      border-color: #34c759;
    }

    .option-btn.wrong {
      background: #ff3b30;
      color: #fff;
      border-color: #ff3b30;
    }

    .option-letter {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .option-btn.selected .option-letter,
    .option-btn.correct .option-letter,
    .option-btn.wrong .option-letter {
      background: rgba(255,255,255,0.3);
    }

    /* 结果提示 */
    .result {
      margin: 16px 0;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
    }

    .result.correct {
      background: #e8f5e9;
      color: #34c759;
    }

    .result.wrong {
      background: #ffebee;
      color: #ff3b30;
    }

    /* 解析区域 */
    .analysis-section {
      background: #f8f9fa;
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
      border-left: 4px solid #0071e3;
    }

    .analysis-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .analysis-icon {
      font-size: 20px;
    }

    .analysis-title {
      font-size: 16px;
      font-weight: 600;
      color: #0071e3;
    }

    .analysis-content {
      font-size: 15px;
      line-height: 1.7;
      color: #1d1d1f;
      margin-bottom: 16px;
    }

    .key-point {
      padding: 16px;
      background: #fff;
      border-radius: 12px;
      font-size: 14px;
      color: #5f6368;
      border: 1px solid #e8e8ed;
    }

    .key-point-label {
      color: #34c759;
      font-weight: 600;
      margin-bottom: 4px;
    }

    /* AI 解析按钮 */
    .ai-section {
      margin-top: 20px;
    }

    .ai-btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #0071e3, #42a5f5);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 12px rgba(0,113,227,0.3);
    }

    .ai-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .ai-btn.loading {
      background: #86868b;
    }

    /* API Key 输入 */
    .api-section {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .api-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #1d1d1f;
    }

    .api-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #e8e8ed;
      font-size: 15px;
      margin-bottom: 12px;
      font-family: monospace;
    }

    .api-input:focus {
      outline: none;
      border-color: #0071e3;
    }

    .api-hint {
      font-size: 13px;
      color: #86868b;
      line-height: 1.5;
    }

    /* 操作按钮 */
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 14px 20px;
      border-radius: 14px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: #1d1d1f;
      color: #fff;
    }

    .btn-secondary {
      background: #f5f5f7;
      color: #1d1d1f;
    }

    /* 底部工具栏 - 固定在底部 */
    .toolbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(20px);
      border-top: 1px solid #e8e8ed;
      padding: 12px 20px;
      display: flex;
      justify-content: space-around;
      z-index: 100;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }

    .toolbar-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      border: none;
      background: transparent;
      color: #86868b;
      font-size: 11px;
      cursor: pointer;
    }

    .toolbar-btn.active {
      color: #0071e3;
    }

    .toolbar-icon {
      font-size: 24px;
    }

    /* 粒子效果 */
    .particle {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      animation: particle-fly 0.6s ease-out forwards;
      z-index: 9999;
    }

    @keyframes particle-fly {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--tx), var(--ty)) scale(0);
        opacity: 0;
      }
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .empty-desc {
      font-size: 14px;
      color: #86868b;
    }

    /* 手机端适配 */
    @media (max-width: 768px) {
      .sidebar {
        display: none; /* 手机端隐藏侧边栏 */
      }
      
      .content {
        padding: 16px;
        max-width: 100%;
      }
      
      .subject-title {
        font-size: 24px;
      }
      
      .question-card {
        padding: 20px;
      }
      
      .question-text {
        font-size: 17px;
      }
      
      .option-btn {
        padding: 16px;
        font-size: 15px;
      }
    }

    /* 桌面端显示侧边栏 */
    @media (min-width: 769px) {
      .mobile-subject-selector {
        display: none;
      }
    }

    /* 手机端科目选择器 */
    .mobile-subject-selector {
      background: #fff;
      padding: 12px 16px;
      margin-bottom: 16px;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .mobile-subject-label {
      font-size: 12px;
      color: #86868b;
      margin-bottom: 8px;
    }

    .mobile-subject-list {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .mobile-subject-item {
      padding: 8px 16px;
      border-radius: 20px;
      background: #f5f5f7;
      color: #1d1d1f;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
      border: none;
    }

    .mobile-subject-item.active {
      background: #0071e3;
      color: #fff;
    }
  </style>
</head>
<body>
  <!-- 顶部考试类型选择 -->
  <nav class="top-nav">
    <div class="exam-tabs" id="examTabs">
      <button class="exam-tab active" onclick="selectExam('全部')">全部</button>
      <button class="exam-tab" onclick="selectExam('临床执业医师')">临床执业医师</button>
      <button class="exam-tab" onclick="selectExam('临床医学考研')">临床医学考研</button>
      <button class="exam-tab" onclick="selectExam('护师资格考试')">护师资格考试</button>
    </div>
  </nav>

  <!-- 主布局 -->
  <div class="main-layout">
    <!-- 左侧科目导航 - 桌面端 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title">选择科目</div>
      <ul class="subject-list" id="subjectList"></ul>
    </aside>

    <!-- 右侧内容区 -->
    <main class="content">
      <!-- 手机端科目选择器 -->
      <div class="mobile-subject-selector" id="mobileSubjectSelector">
        <div class="mobile-subject-label">选择科目</div>
        <div class="mobile-subject-list" id="mobileSubjectList"></div>
      </div>

      <!-- 科目标题 -->
      <header class="subject-header" id="subjectHeader">
        <h1 class="subject-title">全部科目</h1>
        <p class="subject-meta">共 125 道题</p>
      </header>

      <!-- 进度卡片 -->
      <div class="progress-card">
        <div class="progress-header">
          <span class="progress-title">当前进度</span>
          <span class="progress-value" id="progressText">1 / 125</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0.8%"></div>
        </div>
      </div>

      <!-- 题目卡片 -->
      <div class="question-card" id="questionCard">
        <div class="question-meta" id="questionMeta"></div>
        <div class="question-text" id="questionText">加载中...</div>
        <div class="options" id="options"></div>
        <div class="result" id="result" style="display: none;"></div>
        
        <!-- AI 解析按钮 -->
        <div class="ai-section" id="aiSection" style="display: none;">
          <button class="ai-btn" id="aiBtn" onclick="getAIAnalysis()">
            <span>🤖</span>
            <span>获取 AI 解析</span>
          </button>
        </div>

        <!-- 解析区域 -->
        <div class="analysis-section" id="analysisSection" style="display: none;">
          <div class="analysis-header">
            <span class="analysis-icon">💡</span>
            <span class="analysis-title">答案解析</span>
          </div>
          <div class="analysis-content" id="analysisContent"></div>
          <div class="key-point" id="keyPoint"></div>
        </div>

        <!-- 操作按钮 -->
        <div class="actions">
          <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">下一题</button>
          <button class="btn btn-secondary" id="favoriteBtn" onclick="toggleFavorite()">☆ 收藏</button>
        </div>
      </div>

      <!-- API Key 输入 -->
      <div class="api-section" id="apiSection">
        <div class="api-title">DeepSeek API Key</div>
        <input type="password" class="api-input" id="apiKeyInput" placeholder="输入 API Key，例如 sk-...">
        <div class="api-hint">
          输入 API Key 后可使用 AI 解析功能。Key 仅保存在本地浏览器中。
        </div>
      </div>
    </main>
  </div>

  <!-- 底部工具栏 -->
  <div class="toolbar">
    <button class="toolbar-btn" onclick="showWrongBook()">
      <span class="toolbar-icon">📚</span>
      <span>错题本</span>
    </button>
    <button class="toolbar-btn" onclick="resetProgress()">
      <span class="toolbar-icon">↺</span>
      <span>重置</span>
    </button>
    <button class="toolbar-btn" onclick="validateQuestions()">
      <span class="toolbar-icon">✓</span>
      <span>自检</span>
    </button>
  </div>

  <script src="questions.js"></script>
  <script>
    // 数据
    const questions = window.questions || [];
    let currentExam = '全部';
    let currentSubject = '全部';
    let currentIndex = 0;
    let filteredQuestions = [];
    let currentQuestion = null;
    let hasAnswered = false;

    // 初始化
    function init() {
      if (questions.length === 0) {
        document.getElementById('questionText').textContent = '题库加载失败，请检查 questions.js 文件';
        return;
      }
      
      // 从本地存储读取 API Key
      const savedKey = localStorage.getItem('medicalQuiz_apiKey');
      if (savedKey) {
        document.getElementById('apiKeyInput').value = savedKey;
      }
      
      // 监听 API Key 输入
      document.getElementById('apiKeyInput').addEventListener('input', (e) => {
        localStorage.setItem('medicalQuiz_apiKey', e.target.value);
      });
      
      filterQuestions();
      renderSubjectList();
      renderMobileSubjectList();
      renderQuestion();
    }

    // 筛选题目
    function filterQuestions() {
      filteredQuestions = questions.filter(q => {
        const matchExam = currentExam === '全部' || q.examType === currentExam;
        const matchSubject = currentSubject === '全部' || q.subject === currentSubject;
        return matchExam && matchSubject;
      });
    }

    // 选择考试类型
    function selectExam(exam) {
      currentExam = exam;
      currentSubject = '全部';
      currentIndex = 0;
      
      // 更新标签样式
      document.querySelectorAll('.exam-tab').forEach(tab => {
        tab.classList.remove('active');
        if (tab.textContent === exam) tab.classList.add('active');
      });
      
      filterQuestions();
      renderSubjectList();
      renderMobileSubjectList();
      renderQuestion();
    }

    // 渲染科目列表 - 桌面端
    function renderSubjectList() {
      const subjects = ['全部'];
      const subjectCount = {};
      
      questions.forEach(q => {
        if (currentExam === '全部' || q.examType === currentExam) {
          if (!subjects.includes(q.subject)) {
            subjects.push(q.subject);
          }
          subjectCount[q.subject] = (subjectCount[q.subject] || 0) + 1;
        }
      });

      const container = document.getElementById('subjectList');
      container.innerHTML = subjects.map(subject => `
        <li class="subject-item ${subject === currentSubject ? 'active' : ''}" 
            onclick="selectSubject('${subject}')">
          <span>${subject}</span>
          ${subject !== '全部' ? `<span class="subject-count">${subjectCount[subject] || 0}</span>` : ''}
        </li>
      `).join('');
    }

    // 渲染手机端科目列表
    function renderMobileSubjectList() {
      const subjects = ['全部'];
      
      questions.forEach(q => {
        if ((currentExam === '全部' || q.examType === currentExam) && !subjects.includes(q.subject)) {
          subjects.push(q.subject);
        }
      });

      const container = document.getElementById('mobileSubjectList');
      container.innerHTML = subjects.map(subject => `
        <button class="mobile-subject-item ${subject === currentSubject ? 'active' : ''}" 
                onclick="selectSubject('${subject}')">${subject}</button>
      `).join('');
    }

    // 选择科目
    function selectSubject(subject) {
      currentSubject = subject;
      currentIndex = 0;
      renderSubjectList();
      renderMobileSubjectList();
      renderQuestion();
    }

    // 渲染题目
    function renderQuestion() {
      if (filteredQuestions.length === 0) {
        document.getElementById('questionCard').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📚</div>
            <div class="empty-title">暂无题目</div>
            <div class="empty-desc">该科目下暂时没有题目</div>
          </div>
        `;
        return;
      }

      currentQuestion = filteredQuestions[currentIndex];
      hasAnswered = false;
      
      // 恢复卡片结构
      document.getElementById('questionCard').innerHTML = `
        <div class="question-meta" id="questionMeta"></div>
        <div class="question-text" id="questionText"></div>
        <div class="options" id="options"></div>
        <div class="result" id="result" style="display: none;"></div>
        <div class="ai-section" id="aiSection" style="display: none;">
          <button class="ai-btn" id="aiBtn" onclick="getAIAnalysis()">
            <span>🤖</span>
            <span>获取 AI 解析</span>
          </button>
        </div>
        <div class="analysis-section" id="analysisSection" style="display: none;">
          <div class="analysis-header">
            <span class="analysis-icon">💡</span>
            <span class="analysis-title">答案解析</span>
          </div>
          <div class="analysis-content" id="analysisContent"></div>
          <div class="key-point" id="keyPoint"></div>
        </div>
        <div class="actions">
          <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">下一题</button>
          <button class="btn btn-secondary" id="favoriteBtn" onclick="toggleFavorite()">☆ 收藏</button>
        </div>
      `;

      // 更新标题
      document.getElementById('subjectHeader').innerHTML = `
        <h1 class="subject-title">${currentSubject === '全部' ? '全部科目' : currentSubject}</h1>
        <p class="subject-meta">${currentExam === '全部' ? '全部考试' : currentExam} · 共 ${filteredQuestions.length} 道题</p>
      `;

      // 更新进度
      document.getElementById('progressText').textContent = `${currentIndex + 1} / ${filteredQuestions.length}`;
      document.getElementById('progressFill').style.width = `${((currentIndex + 1) / filteredQuestions.length * 100)}%`;

      // 题目元信息
      document.getElementById('questionMeta').innerHTML = `
        <span class="meta-tag">ID: ${currentQuestion.id}</span>
        <span class="meta-tag chapter">${currentQuestion.chapter || '综合'}</span>
        ${currentQuestion.year ? `<span class="meta-tag year">${currentQuestion.year}年真题</span>` : ''}
        <span class="meta-tag">难度: ${'★'.repeat(currentQuestion.difficulty)}</span>
      `;

      // 题目内容
      document.getElementById('questionText').textContent = currentQuestion.question;

      // 选项
      const optionsHtml = currentQuestion.options.map((opt, i) => `
        <button class="option-btn" onclick="selectOption(${i})">
          <span class="option-letter">${String.fromCharCode(65+i)}</span>
          <span>${opt}</span>
        </button>
      `).join('');
      document.getElementById('options').innerHTML = optionsHtml;
    }

    // 选择答案
    function selectOption(selected) {
      if (hasAnswered) return;
      hasAnswered = true;
      
      const correct = currentQuestion.answer;
      const buttons = document.querySelectorAll('.option-btn');
      
      // 标记选中
      buttons[selected].classList.add('selected');
      
      // 显示正确答案
      buttons[correct].classList.add('correct');
      
      // 如果答错，标记错误
      if (selected !== correct) {
        buttons[selected].classList.add('wrong');
      }

      // 显示结果
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';
      resultDiv.className = `result ${selected === correct ? 'correct' : 'wrong'}`;
      resultDiv.innerHTML = selected === correct 
        ? '✅ 回答正确！' 
        : `❌ 回答错误，正确答案是 ${String.fromCharCode(65+correct)}`;

      // 显示 AI 解析按钮
      document.getElementById('aiSection').style.display = 'block';
      
      // 显示本地解析
      showLocalAnalysis();

      // 创建粒子效果
      createParticles(event.clientX, event.clientY);
    }

    // 显示本地解析
    function showLocalAnalysis() {
      document.getElementById('analysisSection').style.display = 'block';
      document.getElementById('analysisContent').innerHTML = `
        <p><strong>正确答案：${String.fromCharCode(65+currentQuestion.answer)}</strong></p>
        <p style="margin-top: 8px;">${currentQuestion.options[currentQuestion.answer]}</p>
      `;
      document.getElementById('keyPoint').innerHTML = `
        <div class="key-point-label">💡 考点提示</div>
        <div>${currentQuestion.keyPoint || '暂无解析'}</div>
      `;
    }

    // 获取 AI 解析
    async function getAIAnalysis() {
      const apiKey = document.getElementById('apiKeyInput').value.trim();
      if (!apiKey) {
        alert('请先输入 DeepSeek API Key');
        document.getElementById('apiKeyInput').focus();
        return;
      }

      const btn = document.getElementById('aiBtn');
      btn.classList.add('loading');
      btn.disabled = true;
      btn.innerHTML = '<span>⏳</span><span>解析中...</span>';

      const optionsText = currentQuestion.options.map((opt, i) => 
        `${String.fromCharCode(65+i)}. ${opt}`
      ).join('\n');

      const prompt = `请解析这道医学题目：\n\n题目：${currentQuestion.question}\n\n选项：\n${optionsText}\n\n正确答案：${String.fromCharCode(65+currentQuestion.answer)}\n\n请提供详细的解析，包括：\n1. 为什么这个答案是正确的\n2. 其他选项为什么错误\n3. 相关知识点扩展`;

      try {
        const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: [
              { role: 'system', content: '你是医学考试辅导专家，擅长解析医学题目。' },
              { role: 'user', content: prompt }
            ],
            temperature: 0.7
          })
        });

        if (!response.ok) throw new Error('API 请求失败');

        const data = await response.json();
        const analysis = data.choices[0].message.content;

        document.getElementById('analysisContent').innerHTML = `
          <p><strong>🤖 AI 解析</strong></p>
          <div style="margin-top: 12px; white-space: pre-wrap;">${analysis}</div>
        `;
      } catch (error) {
        document.getElementById('analysisContent').innerHTML += `
          <p style="color: #ff3b30; margin-top: 12px;">❌ AI 解析失败：${error.message}</p>
        `;
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
        btn.innerHTML = '<span>🤖</span><span>重新获取 AI 解析</span>';
      }
    }

    // 下一题
    function nextQuestion() {
      if (filteredQuestions.length === 0) return;
      currentIndex = (currentIndex + 1) % filteredQuestions.length;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 收藏
    function toggleFavorite() {
      const btn = document.getElementById('favoriteBtn');
      const isFav = btn.textContent.includes('★');
      btn.textContent = isFav ? '☆ 收藏' : '★ 已收藏';
      createParticles(event.clientX, event.clientY);
    }

    // 粒子效果
    function createParticles(x, y) {
      const colors = ['#0071e3', '#42a5f5', '#34c759', '#ff9500'];
      for (let i = 0; i < 8; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        const size = Math.random() * 6 + 4;
        particle.style.cssText = `
          width: ${size}px;
          height: ${size}px;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          left: ${x}px;
          top: ${y}px;
        `;
        const angle = (Math.PI * 2 * i) / 8;
        const distance = Math.random() * 60 + 30;
        particle.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
        particle.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 600);
      }
    }

    // 错题本
    function showWrongBook() {
      alert('错题本功能：记录你答错的题目，方便复习。\n\n功能开发中，敬请期待！');
    }

    // 重置进度
    function resetProgress() {
      currentIndex = 0;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 题库自检
    function validateQuestions() {
      const issues = [];
      const ids = new Set();
      
      questions.forEach((q, i) => {
        if (ids.has(q.id)) issues.push(`第${i+1}题 ID ${q.id} 重复`);
        ids.add(q.id);
        if (!Array.isArray(q.options) || q.options.length !== 4) {
          issues.push(`第${i+1}题 选项数量不对`);
        }
        if (q.answer < 0 || q.answer > 3) {
          issues.push(`第${i+1}题 答案索引错误`);
        }
      });
      
      if (issues.length === 0) {
        alert(`✅ 题库检查通过！\n\n共 ${questions.length} 道题，格式正确，无重复 ID。`);
      } else {
        alert(`⚠️ 发现 ${issues.length} 个问题：\n\n${issues.slice(0, 5).join('\n')}${issues.length > 5 ? '\n...' : ''}`);
      }
    }

    // 启动
    init();
  </script>
</body>
</html>
