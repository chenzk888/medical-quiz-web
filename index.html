<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>医学资格考证平台 - AI解析</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #1e40af;
      --primary-hover: #1e3a8a;
      --primary-soft: #eff6ff;
      --success: #16a34a;
      --error: #dc2626;
      --border: #dbe3ef;
      --shadow-sm: 0 6px 18px rgba(15, 23, 42, 0.06);
      --shadow-md: 0 14px 36px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 860px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 24px;
      box-shadow: var(--shadow-md);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 30px;
      line-height: 1.2;
      color: #0f172a;
      letter-spacing: 0.2px;
    }

    .exam-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 12px;
    }

    .tab-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    .tab-btn:hover {
      border-color: #bfdbfe;
      background: #eff6ff;
    }

    .tab-btn.active {
      border-color: var(--primary);
      background: linear-gradient(135deg, #eff6ff, #dbeafe);
      color: #1e3a8a;
      font-weight: 600;
      box-shadow: inset 0 0 0 1px rgba(30, 64, 175, 0.1);
    }

    .subject-list {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin: 6px 0 12px;
      padding-bottom: 4px;
    }

    .subject-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    .subject-btn.active {
      border-color: #93c5fd;
      background: #eff6ff;
      color: #1d4ed8;
      font-weight: 600;
    }

    .question-panel {
      margin-top: 8px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      box-shadow: var(--shadow-sm);
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .meta-item {
      font-size: 12px;
      color: #475569;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 999px;
      padding: 5px 9px;
    }

    .question {
      font-size: 18px;
      line-height: 1.6;
      margin: 12px 0 18px;
      color: #0f172a;
      font-weight: 600;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .option-btn:hover {
      border-color: #93c5fd;
      background: #eff6ff;
      transform: translateY(-1px);
    }

    .option-btn.selected {
      border-color: #1e3a8a;
      background: linear-gradient(135deg, #1e40af, #1d4ed8);
      color: #ffffff;
      box-shadow: 0 10px 18px rgba(30, 64, 175, 0.24);
    }

    .option-btn.correct {
      border-color: var(--success);
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: #ffffff;
      box-shadow: 0 10px 18px rgba(22, 163, 74, 0.22);
    }

    .option-btn.wrong {
      border-color: var(--error);
      background: linear-gradient(135deg, #dc2626, #ef4444);
      color: #ffffff;
      box-shadow: 0 10px 18px rgba(220, 38, 38, 0.22);
    }

    .result {
      margin-top: 14px;
      font-size: 16px;
      min-height: 24px;
    }

    .result.correct {
      color: var(--success);
      font-weight: 600;
    }

    .result.wrong {
      color: var(--error);
      font-weight: 600;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .primary-btn {
      border: 0;
      border-radius: 12px;
      padding: 11px 15px;
      background: linear-gradient(135deg, var(--primary), #1d4ed8);
      color: #fff;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      box-shadow: 0 8px 14px rgba(30, 64, 175, 0.2);
      transition: transform 0.12s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    .primary-btn:hover {
      filter: brightness(1.02);
      box-shadow: 0 10px 18px rgba(30, 64, 175, 0.26);
    }

    .primary-btn:active {
      transform: scale(0.95);
      box-shadow: 0 6px 10px rgba(30, 64, 175, 0.2);
    }

    .primary-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .stats-bar {
      margin: 0 0 12px;
      padding: 14px;
      font-size: 14px;
      background: #f8fbff;
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--muted);
      box-shadow: var(--shadow-sm);
    }

    .stats-bar .stats-row-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    #progressText {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
    }

    .stats-bar strong {
      color: var(--text);
      font-weight: 600;
    }

    .progress-track {
      height: 10px;
      border-radius: 999px;
      background: #dbe7ff;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #1d4ed8, #1e40af);
      width: 0%;
      transition: width 0.3s ease;
    }

    .stats-accuracy {
      font-size: 14px;
      line-height: 1.45;
      color: #475569;
    }

    .stats-accuracy .rate {
      font-size: 22px;
      font-weight: 800;
      margin-right: 4px;
      vertical-align: middle;
    }

    .stats-accuracy.rate-good .rate {
      color: var(--success);
    }

    .stats-accuracy.rate-bad .rate {
      color: var(--error);
    }

    .stats-accuracy .num-ok {
      color: var(--success);
      font-weight: 600;
    }

    .stats-accuracy .num-bad {
      color: var(--error);
      font-weight: 600;
    }

    .learn-footer {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 50;
      padding: 16px;
      box-sizing: border-box;
    }

    @media (min-width: 640px) {
      .modal-backdrop {
        align-items: center;
      }
    }

    .modal-backdrop[hidden] {
      display: none !important;
    }

    .wrong-book-card {
      width: 100%;
      max-width: 560px;
      max-height: min(78vh, 640px);
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .wrong-book-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: #fafbfc;
    }

    .wrong-book-head h2 {
      margin: 0;
      font-size: 17px;
      font-weight: 600;
    }

    .wrong-book-body {
      padding: 12px 14px;
      overflow-y: auto;
      flex: 1;
    }

    .wrong-item {
      text-align: left;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .wrong-item:hover {
      border-color: #93c5fd;
      background: #f8fafc;
    }

    .wrong-item .stem {
      font-size: 14px;
      color: var(--text);
      line-height: 1.55;
      margin-bottom: 8px;
    }

    .wrong-item .ans {
      font-size: 13px;
      color: var(--success);
      font-weight: 600;
    }

    .wrong-empty {
      text-align: center;
      color: var(--muted);
      padding: 24px 12px;
      font-size: 14px;
    }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .analysis {
      margin-top: 14px;
      border: 1px solid #dbeafe;
      border-left: 5px solid #1d4ed8;
      border-radius: 14px;
      padding: 14px;
      white-space: pre-wrap;
      line-height: 1.65;
      background: #f8fbff;
      min-height: 56px;
      box-shadow: var(--shadow-sm);
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.3s ease, transform 0.3s ease, border-color 0.3s ease, background 0.3s ease;
    }

    .analysis.is-loading {
      border-left-color: #1d4ed8;
      background: #eff6ff;
      animation: pulse 1.1s ease-in-out infinite;
    }

    .analysis.is-success {
      border-left-color: var(--success);
      background: #f0fdf4;
    }

    .analysis.is-error {
      border-left-color: var(--error);
      background: #fef2f2;
    }

    .analysis.is-animating {
      opacity: 0;
      transform: translateY(8px);
    }

    .api-key-block {
      margin-top: 14px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #ffffff;
      box-shadow: var(--shadow-sm);
    }

    .api-key-block label[for="apiKeyInput"] {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .api-key-input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: ui-monospace, Consolas, monospace;
      background: #fff;
    }

    .api-key-input:focus {
      outline: none;
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .api-key-toolbar {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
    }

    .api-key-toolbar label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }

    .api-key-toolbar input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
    }

    .secondary-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 9px 14px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .secondary-btn:hover {
      border-color: #cbd5e1;
      background: #f8fafc;
      box-shadow: 0 6px 12px rgba(15, 23, 42, 0.08);
    }

    .secondary-btn:active {
      transform: scale(0.95);
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .icon {
      font-size: 14px;
      line-height: 1;
      opacity: 0.85;
    }

    .favorite-btn.active {
      border-color: #f59e0b;
      color: #b45309;
      background: #fffbeb;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.65; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>医学资格考证平台</h1>
    <div class="stats-bar" id="statsBar" hidden>
      <div class="stats-row-top">
        <span id="progressText"><strong>第 1 / 1 题</strong></span>
      </div>
      <div class="progress-track" aria-hidden="true">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="stats-accuracy" id="accuracyText">当前正确率：—（本考试暂无答题记录）</div>
    </div>
    <section class="exam-tabs" id="examTabs"></section>
    <section class="subject-list" id="subjectList"></section>
    <section class="question-panel">
      <div class="meta" id="questionMeta"></div>
      <p class="question" id="question"></p>
      <section class="options" id="options"></section>
      <div class="result" id="result"></div>
      <div class="actions">
        <button id="nextBtn" class="primary-btn">下一题</button>
        <button id="aiBtn" class="primary-btn" disabled>AI解析</button>
        <button type="button" id="favoriteBtn" class="secondary-btn icon-btn favorite-btn">
          <span class="icon">&#9733;</span><span>收藏本题</span>
        </button>
      </div>
    </section>

    <div class="api-key-block" id="apiKeyBlock">
      <label for="apiKeyInput">DeepSeek API Key</label>
      <input
        type="password"
        id="apiKeyInput"
        class="api-key-input"
        placeholder="输入 API Key，例如 sk-..."
        spellcheck="false"
        autocomplete="off"
        autocapitalize="off"
      />
      <div class="api-key-toolbar">
        <label>
          <input type="checkbox" id="rememberKeyCb" checked />
          记住 Key
        </label>
        <button type="button" id="clearKeyBtn" class="secondary-btn">清除 Key</button>
      </div>
      <p class="hint" style="margin-top:10px;margin-bottom:0">
        勾选「记住 Key」后，成功解析时会保存到本机 localStorage；不勾选则仅本次使用，且不会写入本地。
      </p>
    </div>

    <article class="analysis" id="analysis">AI解析会显示在这里。</article>

    <div class="learn-footer">
      <button type="button" id="showWrongBtn" class="secondary-btn icon-btn">
        <span class="icon">&#128214;</span><span>查看错题</span>
      </button>
      <button type="button" id="resetProgressBtn" class="secondary-btn icon-btn">
        <span class="icon">&#8635;</span><span>重置进度</span>
      </button>
      <button type="button" id="validateQuestionsBtn" class="secondary-btn icon-btn">
        <span class="icon">&#10003;</span><span>题库自检</span>
      </button>
    </div>
  </main>

  <div class="modal-backdrop" id="wrongBookModal" hidden>
    <div class="wrong-book-card" role="dialog" aria-labelledby="wrongBookTitle">
      <div class="wrong-book-head">
        <h2 id="wrongBookTitle">错题本</h2>
        <button type="button" id="closeWrongBookBtn" class="secondary-btn">关闭</button>
      </div>
      <div class="wrong-book-body" id="wrongBookList"></div>
    </div>
  </div>

  <!-- 题库必须先于下方内联脚本加载；须与 index.html 同目录 -->
  <script src="questions.js" charset="utf-8"></script>
  <script>
    const examPromptProfiles = {
      临床执业医师: "解析重点：临床思维路径、鉴别诊断、诊疗规范与关键处置节点。",
      临床医学考研: "解析重点：知识点深度、机制推导、易混概念辨析与高频考法。",
      护师资格考试: "解析重点：护理操作流程、病情观察重点、并发症预警与护理安全。",
      执业药师: "解析重点：药理机制、药代动力学、不良反应及合理用药方案。"
    };

    const OPTION_KEYS = ["A", "B", "C", "D"];
    const LS_API_KEY = "medicalQuiz_deepseek_api_key";
    const LS_LEARN_STATS = "medicalQuiz_learnStats_v1";

  const questions = window.questions || []; 

    const examTabsEl = document.getElementById("examTabs");
    const subjectListEl = document.getElementById("subjectList");
    const questionMetaEl = document.getElementById("questionMeta");
    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const resultEl = document.getElementById("result");
    const nextBtn = document.getElementById("nextBtn");
    const aiBtn = document.getElementById("aiBtn");
    const analysisEl = document.getElementById("analysis");
    const statsBarEl = document.getElementById("statsBar");
    const progressTextEl = document.getElementById("progressText");
    const progressFillEl = document.getElementById("progressFill");
    const accuracyTextEl = document.getElementById("accuracyText");
    const showWrongBtn = document.getElementById("showWrongBtn");
    const resetProgressBtn = document.getElementById("resetProgressBtn");
    const validateQuestionsBtn = document.getElementById("validateQuestionsBtn");
    const favoriteBtn = document.getElementById("favoriteBtn");
    const wrongBookModal = document.getElementById("wrongBookModal");
    const wrongBookList = document.getElementById("wrongBookList");
    const closeWrongBookBtn = document.getElementById("closeWrongBookBtn");
    const apiKeyBlock = document.getElementById("apiKeyBlock");
    const apiKeyInput = document.getElementById("apiKeyInput");
    const rememberKeyCb = document.getElementById("rememberKeyCb");
    const clearKeyBtn = document.getElementById("clearKeyBtn");

    let activeExamIndex = 0;
    let activeSubjectIndex = 0;
    let activeQuestionIndex = 0;
    let selectedOption = null;
    let answeredThisQuestion = false;
    const favoriteIds = new Set();

    function loadLearnStatsRaw() {
      try {
        const raw = localStorage.getItem(LS_LEARN_STATS);
        if (!raw) return { exams: {} };
        const o = JSON.parse(raw);
        if (!o || typeof o !== "object" || !o.exams || typeof o.exams !== "object") return { exams: {} };
        return o;
      } catch {
        return { exams: {} };
      }
    }

    function saveLearnStatsRaw(data) {
      localStorage.setItem(LS_LEARN_STATS, JSON.stringify(data));
    }

    function getExamLearnStats(examType) {
      const data = loadLearnStatsRaw();
      const e = data.exams[examType];
      if (!e) return { correct: 0, wrong: 0, wrongIds: [] };
      return {
        correct: Number(e.correct) || 0,
        wrong: Number(e.wrong) || 0,
        wrongIds: Array.isArray(e.wrongIds) ? e.wrongIds : []
      };
    }

    function recordAnswerToStorage(q, isCorrect) {
      const data = loadLearnStatsRaw();
      if (!data.exams[q.examType]) {
        data.exams[q.examType] = { correct: 0, wrong: 0, wrongIds: [] };
      }
      const e = data.exams[q.examType];
      if (!Array.isArray(e.wrongIds)) e.wrongIds = [];
      if (isCorrect) {
        e.correct += 1;
      } else {
        e.wrong += 1;
        if (!e.wrongIds.includes(q.id)) e.wrongIds.push(q.id);
      }
      saveLearnStatsRaw(data);
    }

    function clearAllLearnStats() {
      localStorage.removeItem(LS_LEARN_STATS);
    }

    function goToQuestionById(id) {
      const q = questions.find((item) => item.id === id);
      if (!q) return;
      const types = getExamTypes();
      const ei = types.indexOf(q.examType);
      if (ei < 0) return;
      activeExamIndex = ei;
      const subjects = getSubjectsForExam(q.examType);
      const si = subjects.indexOf(q.subject);
      if (si < 0) return;
      activeSubjectIndex = si;
      const qList = getQuestionsForExamSubject(q.examType, q.subject);
      const qi = qList.findIndex((item) => item.id === id);
      if (qi < 0) return;
      activeQuestionIndex = qi;
      wrongBookModal.hidden = true;
      resetQuestionUI();
      renderAll();
    }

    function renderWrongBookList() {
      const examType = getActiveExamType();
      const e = getExamLearnStats(examType);
      wrongBookList.innerHTML = "";
      const ids = [...e.wrongIds].sort((a, b) => a - b);
      if (!ids.length) {
        const p = document.createElement("p");
        p.className = "wrong-empty";
        p.textContent = "当前考试类型下暂无错题记录。";
        wrongBookList.appendChild(p);
        return;
      }
      ids.forEach((id) => {
        const q = questions.find((item) => item.id === id);
        if (!q) return;
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "wrong-item";
        const stem = document.createElement("div");
        stem.className = "stem";
        stem.textContent = `（ID ${q.id}）${q.question}`;
        const ans = document.createElement("div");
        ans.className = "ans";
        const letter = OPTION_KEYS[q.answer];
        ans.textContent = `正确答案：${letter}. ${q.options[q.answer]}`;
        btn.appendChild(stem);
        btn.appendChild(ans);
        btn.addEventListener("click", () => goToQuestionById(id));
        wrongBookList.appendChild(btn);
      });
    }

    function getExamTypes() {
      const order = [];
      const seen = new Set();
      for (const q of questions) {
        if (!seen.has(q.examType)) {
          seen.add(q.examType);
          order.push(q.examType);
        }
      }
      return order;
    }

    function getSubjectsForExam(examType) {
      const order = [];
      const seen = new Set();
      for (const q of questions) {
        if (q.examType === examType && !seen.has(q.subject)) {
          seen.add(q.subject);
          order.push(q.subject);
        }
      }
      return order;
    }

    function getQuestionsForExamSubject(examType, subject) {
      return questions.filter((item) => item.examType === examType && item.subject === subject);
    }

    function getActiveExamType() {
      const types = getExamTypes();
      if (activeExamIndex >= types.length) activeExamIndex = 0;
      return types[activeExamIndex];
    }

    function getActiveSubjectName() {
      const subjects = getSubjectsForExam(getActiveExamType());
      if (activeSubjectIndex >= subjects.length) activeSubjectIndex = 0;
      return subjects[activeSubjectIndex];
    }

    function getActiveQuestion() {
      const list = getQuestionsForExamSubject(getActiveExamType(), getActiveSubjectName());
      if (activeQuestionIndex >= list.length) activeQuestionIndex = 0;
      return list[activeQuestionIndex];
    }

    function getCorrectKey(q) {
      return OPTION_KEYS[q.answer];
    }

    function initApiKeyFromStorage() {
      const saved = localStorage.getItem(LS_API_KEY);
      if (saved && String(saved).trim()) {
        apiKeyInput.value = String(saved).trim();
        rememberKeyCb.checked = true;
      }
      updateAiBtnEnabledState();
    }

    function persistApiKeyIfNeeded(apiKey) {
      if (rememberKeyCb.checked) {
        localStorage.setItem(LS_API_KEY, apiKey);
      } else {
        localStorage.removeItem(LS_API_KEY);
      }
    }

    function hasApiKey() {
      return Boolean(apiKeyInput.value.trim());
    }

    function updateAiBtnEnabledState() {
      // API Key 输入区应始终可见，避免误被隐藏。
      apiKeyBlock.hidden = false;
      aiBtn.disabled = !answeredThisQuestion || !hasApiKey();
    }

    function updateStatsBar() {
      if (!questions.length) {
        statsBarEl.hidden = true;
        return;
      }
      const list = getQuestionsForExamSubject(getActiveExamType(), getActiveSubjectName());
      const total = list.length;
      if (!total) {
        statsBarEl.hidden = true;
        return;
      }
      statsBarEl.hidden = false;
      const x = Math.min(activeQuestionIndex + 1, total);
      progressTextEl.innerHTML = `<strong>第 ${x} / ${total} 题</strong>`;
      const pct = Math.round((x / total) * 100);
      progressFillEl.style.width = `${pct}%`;

      const examType = getActiveExamType();
      const st = getExamLearnStats(examType);
      const attempts = st.correct + st.wrong;
      if (attempts === 0) {
        accuracyTextEl.classList.remove("rate-good", "rate-bad");
        accuracyTextEl.textContent = "当前正确率：—（本考试暂无答题记录）";
      } else {
        const rate = Math.round((st.correct / attempts) * 100);
        accuracyTextEl.classList.toggle("rate-good", rate >= 60);
        accuracyTextEl.classList.toggle("rate-bad", rate < 40);
        accuracyTextEl.innerHTML = `当前正确率：<span class="rate">${rate}%</span>（<span class="num-ok">答对${st.correct}题</span>/<span class="num-bad">答错${st.wrong}题</span>）`;
      }
    }

    function setAnalysis(text, state) {
      analysisEl.classList.remove("is-loading", "is-success", "is-error", "is-animating");
      analysisEl.classList.add("is-animating");
      window.requestAnimationFrame(() => {
        analysisEl.textContent = text;
        if (state === "loading") analysisEl.classList.add("is-loading");
        if (state === "success") analysisEl.classList.add("is-success");
        if (state === "error") analysisEl.classList.add("is-error");
        analysisEl.classList.remove("is-animating");
      });
    }

    function updateFavoriteBtnState() {
      const q = getActiveQuestion();
      if (!q) {
        favoriteBtn.classList.remove("active");
        favoriteBtn.disabled = true;
        return;
      }
      favoriteBtn.disabled = false;
      favoriteBtn.classList.toggle("active", favoriteIds.has(q.id));
    }

    function renderExamTabs() {
      examTabsEl.innerHTML = "";
      if (!questions.length) {
        const tip = document.createElement("p");
        tip.className = "hint";
        tip.style.color = "var(--error)";
        tip.textContent =
          "题库未加载：请确认 questions.js 与 index.html 在同一文件夹，且 questions.js 无语法错误。若仍空白，请用本地静态服务器打开本目录。";
        examTabsEl.appendChild(tip);
        return;
      }
      const types = getExamTypes();
      types.forEach((examType, index) => {
        const btn = document.createElement("button");
        btn.className = `tab-btn ${index === activeExamIndex ? "active" : ""}`;
        btn.type = "button";
        btn.textContent = examType;
        btn.addEventListener("click", () => {
          if (activeExamIndex === index) return;
          activeExamIndex = index;
          activeSubjectIndex = 0;
          activeQuestionIndex = 0;
          resetQuestionUI();
          renderAll();
        });
        examTabsEl.appendChild(btn);
      });
    }

    function renderSubjectList() {
      subjectListEl.innerHTML = "";
      const subjects = getSubjectsForExam(getActiveExamType());
      subjects.forEach((name, index) => {
        const btn = document.createElement("button");
        btn.className = `subject-btn ${index === activeSubjectIndex ? "active" : ""}`;
        btn.type = "button";
        btn.textContent = name;
        btn.addEventListener("click", () => {
          if (activeSubjectIndex === index) return;
          activeSubjectIndex = index;
          activeQuestionIndex = 0;
          resetQuestionUI();
          renderAll();
        });
        subjectListEl.appendChild(btn);
      });
    }

    function renderQuestion() {
      const q = getActiveQuestion();
      if (!q) {
        questionMetaEl.innerHTML = "";
        questionEl.textContent = "当前分类下暂无题目。";
        optionsEl.innerHTML = "";
        updateStatsBar();
        return;
      }

      questionMetaEl.innerHTML = "";
      const metaEntries = [
        `ID：${q.id}`,
        `考试：${q.examType}`,
        `科目：${q.subject}`,
        q.chapter ? `章节：${q.chapter}` : "",
        `难度：${"★".repeat(q.difficulty)}`,
        q.year != null ? `年份：${q.year}` : "",
        q.keyPoint ? `考点：${q.keyPoint}` : ""
      ].filter(Boolean);

      metaEntries.forEach((text) => {
        const span = document.createElement("span");
        span.className = "meta-item";
        span.textContent = text;
        questionMetaEl.appendChild(span);
      });

      questionEl.textContent = q.question;
      optionsEl.innerHTML = "";
      q.options.forEach((text, i) => {
        const key = OPTION_KEYS[i];
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.type = "button";
        btn.dataset.key = key;
        btn.textContent = `${key}. ${text}`;
        btn.addEventListener("click", () => onSelect(key));
        optionsEl.appendChild(btn);
      });
      updateStatsBar();
      updateFavoriteBtnState();
    }

    function onSelect(key) {
      const q = getActiveQuestion();
      if (!q) return;
      if (answeredThisQuestion) return;

      const correctKey = getCorrectKey(q);
      selectedOption = key;
      const allBtns = document.querySelectorAll(".option-btn");

      allBtns.forEach((btn) => {
        btn.classList.remove("selected", "correct", "wrong");
        if (btn.dataset.key === key) {
          btn.classList.add("selected");
        }
      });

      const correctText = q.options[q.answer];
      const isCorrect = key === correctKey;
      answeredThisQuestion = true;
      recordAnswerToStorage(q, isCorrect);
      updateStatsBar();
      resultEl.textContent = isCorrect
        ? `回答正确：${correctKey}. ${correctText}`
        : `回答错误：正确答案是 ${correctKey}. ${correctText}`;
      resultEl.className = `result ${isCorrect ? "correct" : "wrong"}`;

      allBtns.forEach((btn) => {
        if (btn.dataset.key === correctKey) {
          btn.classList.add("correct");
        } else if (btn.dataset.key === key && key !== correctKey) {
          btn.classList.add("wrong");
        }
      });

      updateAiBtnEnabledState();
      setAnalysis(hasApiKey()
        ? "点击“AI解析”获取详细说明。"
        : "请先在上方输入 DeepSeek API Key，然后点击“AI解析”。", isCorrect ? "success" : "error");
    }

    function resetQuestionUI() {
      selectedOption = null;
      answeredThisQuestion = false;
      resultEl.textContent = "";
      resultEl.className = "result";
      updateAiBtnEnabledState();
      setAnalysis("请选择一个答案后查看AI解析。", "neutral");
    }

    function nextQuestion() {
      const qList = getQuestionsForExamSubject(getActiveExamType(), getActiveSubjectName());
      if (!qList.length) return;
      activeQuestionIndex = (activeQuestionIndex + 1) % qList.length;
      resetQuestionUI();
      renderQuestion();
    }

    function renderAll() {
      renderExamTabs();
      if (!questions.length) {
        subjectListEl.innerHTML = "";
        questionMetaEl.innerHTML = "";
        questionEl.textContent = "";
        optionsEl.innerHTML = "";
        statsBarEl.hidden = true;
        return;
      }
      renderSubjectList();
      renderQuestion();
    }

    function validateQuestionBank() {
      const issues = [];
      const idMap = new Map();
      const stemMap = new Map();
      const requiredFields = ["id", "examType", "subject", "question", "options", "answer", "difficulty"];

      questions.forEach((q, i) => {
        const idx = i + 1;

        if (!q || typeof q !== "object") {
          issues.push(`第${idx}题不是对象`);
          return;
        }

        requiredFields.forEach((field) => {
          if (!(field in q)) issues.push(`第${idx}题缺少字段 ${field}`);
        });

        if (!Number.isInteger(q.id) || q.id <= 0) {
          issues.push(`第${idx}题 id 非正整数`);
        } else if (idMap.has(q.id)) {
          issues.push(`第${idx}题与第${idMap.get(q.id)}题 id 重复（${q.id}）`);
        } else {
          idMap.set(q.id, idx);
        }

        if (!Array.isArray(q.options) || q.options.length !== 4) {
          issues.push(`第${idx}题 options 不是4个选项`);
        }

        if (!Number.isInteger(q.answer) || q.answer < 0 || q.answer > 3) {
          issues.push(`第${idx}题 answer 不在 0-3`);
        }

        if (!Number.isInteger(q.difficulty) || q.difficulty < 1 || q.difficulty > 5) {
          issues.push(`第${idx}题 difficulty 不在 1-5`);
        }

        const stem = String(q.question || "").trim().replace(/\s+/g, " ");
        if (!stem) {
          issues.push(`第${idx}题 question 为空`);
        } else if (stemMap.has(stem)) {
          issues.push(`第${idx}题与第${stemMap.get(stem)}题题干重复`);
        } else {
          stemMap.set(stem, idx);
        }
      });

      if (issues.length === 0) {
        setAnalysis(`题库自检通过：共 ${questions.length} 题，未发现重复 id/题干或字段错误。`, "success");
      } else {
        setAnalysis(`题库自检发现 ${issues.length} 个问题：\n- ${issues.join("\n- ")}`, "error");
      }
    }

    async function getAIAnalysis() {
      if (!selectedOption) return;
      const q = getActiveQuestion();
      if (!q) return;

      const apiKey = apiKeyInput.value.trim();
      if (!apiKey) {
        setAnalysis("请先在上方输入 DeepSeek API Key。", "error");
        apiKeyInput.focus();
        return;
      }

      aiBtn.disabled = true;
      aiBtn.textContent = "解析中...";
      setAnalysis("正在调用 DeepSeek，请稍候...", "loading");

      const optionsText = q.options.map((text, i) => `${OPTION_KEYS[i]}. ${text}`).join(" ");
      const examSpecificPrompt = examPromptProfiles[q.examType] || examPromptProfiles.执业药师;
      const prompt = [
        "你是一名资深医学考试讲师，请用医考辅导书讲解风格（类似贺银成/昭昭医考）解析以下单选题。",
        `题目编号：${q.id}`,
        `考试类型：${q.examType}`,
        `科目：${q.subject}`,
        q.chapter ? `章节：${q.chapter}` : "",
        `难度：${q.difficulty}`,
        q.year != null ? `年份：${q.year}` : "",
        q.keyPoint ? `题库给出的核心考点提示：${q.keyPoint}` : "",
        `题目：${q.question}`,
        `选项：${optionsText}`,
        `用户选择：${selectedOption}`,
        `标准答案：${getCorrectKey(q)}（选项索引 ${q.answer}，0=A）`,
        examSpecificPrompt,
        "请严格按以下四个部分输出，标题必须逐字一致：",
        "【考点定位】",
        "- 用1-2句话说明本题核心考点、常见命题陷阱。",
        "【题眼分析】",
        "- 抓题干关键词（题眼）并解释其诊断指向，像辅导书划重点那样讲。",
        "【选项剖析】",
        "- 按A/B/C/D逐项分析：为什么对或错；同时点出与正确答案的关键鉴别点。",
        "- 需要明确说明用户所选项为什么对/错。",
        "【关联考点】",
        "- 补充1-2个高频相关考点，提示如何在相似题中避免误选。",
        "最后单独给出一行【记忆口诀】：",
        "- 口诀要短、顺口、便于考场快速回忆。",
        "语言要求：简洁有力、重点突出、口语化教学语气，避免冗长。"
      ].filter(Boolean).join("\n");

      try {
        const response = await fetch("https://api.deepseek.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: "deepseek-chat",
            messages: [
              { role: "system", content: "你是医学考试辅导名师，风格像主流医考辅导书：抓题眼、讲套路、重鉴别、给口诀。回答必须准确、结构化、可背诵。" },
              { role: "user", content: prompt }
            ],
            temperature: 0.3
          })
        });

        if (!response.ok) {
          const errText = await response.text();
          throw new Error(`API请求失败（${response.status}）：${errText}`);
        }

        const data = await response.json();
        const content = data?.choices?.[0]?.message?.content?.trim();
        setAnalysis(content || "未获取到有效解析内容。", "success");
        persistApiKeyIfNeeded(apiKey);
      } catch (error) {
        setAnalysis(`调用失败：${error.message}\n\n如果浏览器跨域受限，建议用后端代理转发 DeepSeek 请求。`, "error");
      } finally {
        updateAiBtnEnabledState();
        aiBtn.textContent = "AI解析";
      }
    }

    aiBtn.addEventListener("click", getAIAnalysis);
    nextBtn.addEventListener("click", nextQuestion);
    apiKeyInput.addEventListener("input", () => {
      updateAiBtnEnabledState();
      if (answeredThisQuestion && !hasApiKey()) {
        setAnalysis("请先在上方输入 DeepSeek API Key。", "error");
      }
    });
    clearKeyBtn.addEventListener("click", () => {
      localStorage.removeItem(LS_API_KEY);
      apiKeyInput.value = "";
      rememberKeyCb.checked = true;
      updateAiBtnEnabledState();
    });
    favoriteBtn.addEventListener("click", () => {
      const q = getActiveQuestion();
      if (!q) return;
      if (favoriteIds.has(q.id)) {
        favoriteIds.delete(q.id);
        setAnalysis(`已取消收藏第 ${q.id} 题。`, "neutral");
      } else {
        favoriteIds.add(q.id);
        setAnalysis(`已收藏第 ${q.id} 题。`, "success");
      }
      updateFavoriteBtnState();
    });

    showWrongBtn.addEventListener("click", () => {
      renderWrongBookList();
      wrongBookModal.hidden = false;
    });
    closeWrongBookBtn.addEventListener("click", () => {
      wrongBookModal.hidden = true;
    });
    wrongBookModal.addEventListener("click", (ev) => {
      if (ev.target === wrongBookModal) wrongBookModal.hidden = true;
    });
    document.addEventListener("keydown", (ev) => {
      if (ev.key === "Escape" && !wrongBookModal.hidden) wrongBookModal.hidden = true;
    });

    resetProgressBtn.addEventListener("click", () => {
      if (
        !window.confirm(
          "确定清空所有答题记录与错题本？（各考试正确率与错题列表将归零；不影响 API Key）"
        )
      ) {
        return;
      }
      clearAllLearnStats();
      resetQuestionUI();
      renderAll();
    });
    validateQuestionsBtn.addEventListener("click", validateQuestionBank);

    initApiKeyFromStorage();
    resetQuestionUI();
    renderAll();
  </script>
</body>
</html>
