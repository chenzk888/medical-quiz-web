<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>医学资格考证平台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "Microsoft YaHei", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* 顶部导航 - 考试类型 */
    .top-nav {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid #e8e8ed;
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .exam-tabs {
      display: flex;
      gap: 12px;
      justify-content: center;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .exam-tab {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      background: transparent;
      color: #1d1d1f;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .exam-tab:hover {
      background: #f5f5f7;
    }

    .exam-tab.active {
      background: #0071e3;
      color: #fff;
    }

    /* 主布局 - 左侧科目栏 + 右侧内容 */
    .main-layout {
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
      min-height: calc(100vh - 70px);
    }

    /* 左侧科目导航 */
    .sidebar {
      width: 280px;
      background: #fff;
      border-right: 1px solid #e8e8ed;
      padding: 30px 0;
      position: sticky;
      top: 70px;
      height: calc(100vh - 70px);
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 12px;
      font-weight: 600;
      color: #86868b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 24px 16px;
    }

    .subject-list {
      list-style: none;
    }

    .subject-item {
      padding: 12px 24px;
      cursor: pointer;
      transition: all 0.2s ease;
      border-left: 3px solid transparent;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .subject-item:hover {
      background: #f5f5f7;
    }

    .subject-item.active {
      background: #f5f5f7;
      border-left-color: #0071e3;
    }

    .subject-name {
      font-size: 15px;
      font-weight: 500;
    }

    .subject-count {
      font-size: 12px;
      color: #86868b;
      background: #f5f5f7;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .subject-item.active .subject-count {
      background: #0071e3;
      color: #fff;
    }

    /* 右侧内容区 */
    .content {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
    }

    /* 科目标题 */
    .subject-header {
      margin-bottom: 30px;
    }

    .subject-title {
      font-size: 40px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .subject-meta {
      font-size: 17px;
      color: #86868b;
    }

    /* 进度卡片 */
    .progress-card {
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .progress-title {
      font-size: 15px;
      font-weight: 600;
    }

    .progress-value {
      font-size: 24px;
      font-weight: 600;
      color: #0071e3;
    }

    .progress-bar {
      height: 8px;
      background: #e8e8ed;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #0071e3, #42a5f5);
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    /* 题目卡片 */
    .question-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      margin-bottom: 20px;
      animation: slideIn 0.4s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .question-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .meta-tag {
      padding: 6px 12px;
      border-radius: 12px;
      background: #f5f5f7;
      color: #86868b;
      font-size: 12px;
      font-weight: 500;
    }

    .meta-tag.chapter {
      background: #e8f5e9;
      color: #34c759;
    }

    .meta-tag.year {
      background: #e3f2fd;
      color: #0071e3;
    }

    .question-text {
      font-size: 22px;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 30px;
      color: #1d1d1f;
    }

    /* 选项 */
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-btn {
      padding: 16px 20px;
      border-radius: 12px;
      border: 1px solid #e8e8ed;
      background: #fff;
      color: #1d1d1f;
      font-size: 16px;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .option-btn:hover {
      background: #f5f5f7;
      border-color: #0071e3;
    }

    .option-btn.selected {
      background: #0071e3;
      color: #fff;
      border-color: #0071e3;
    }

    .option-btn.correct {
      background: #34c759;
      color: #fff;
      border-color: #34c759;
    }

    .option-btn.wrong {
      background: #ff3b30;
      color: #fff;
      border-color: #ff3b30;
    }

    .option-letter {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .option-btn.selected .option-letter,
    .option-btn.correct .option-letter,
    .option-btn.wrong .option-letter {
      background: rgba(255,255,255,0.3);
    }

    /* 解析区域 */
    .analysis-section {
      background: #f5f5f7;
      border-radius: 16px;
      padding: 24px;
      margin-top: 24px;
      border-left: 4px solid #0071e3;
    }

    .analysis-title {
      font-size: 15px;
      font-weight: 600;
      color: #0071e3;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .analysis-content {
      font-size: 15px;
      line-height: 1.7;
      color: #1d1d1f;
    }

    .key-point {
      margin-top: 16px;
      padding: 16px;
      background: #fff;
      border-radius: 12px;
      font-size: 14px;
      color: #86868b;
    }

    .key-point strong {
      color: #34c759;
    }

    /* 操作按钮 */
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 30px;
    }

    .btn {
      padding: 14px 28px;
      border-radius: 20px;
      border: none;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #0071e3, #42a5f5);
      color: #fff;
      box-shadow: 0 4px 12px rgba(0,113,227,0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,113,227,0.4);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #fff;
      color: #1d1d1f;
      border: 1px solid #e8e8ed;
    }

    .btn-secondary:hover {
      background: #f5f5f7;
    }

    /* 底部工具栏 */
    .toolbar {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(20px);
      padding: 12px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .toolbar-btn {
      padding: 10px 20px;
      border-radius: 12px;
      border: none;
      background: transparent;
      color: #1d1d1f;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .toolbar-btn:hover {
      background: #f5f5f7;
    }

    /* 粒子效果 */
    .particle {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      animation: particle-fly 0.8s ease-out forwards;
      z-index: 9999;
    }

    @keyframes particle-fly {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--tx), var(--ty)) scale(0);
        opacity: 0;
      }
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .empty-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .empty-desc {
      font-size: 15px;
      color: #86868b;
    }

    /* 响应式 */
    @media (max-width: 1024px) {
      .sidebar {
        width: 240px;
      }
    }

    @media (max-width: 768px) {
      .main-layout {
        flex-direction: column;
      }
      
      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
        top: 0;
        border-right: none;
        border-bottom: 1px solid #e8e8ed;
        padding: 20px;
      }
      
      .subject-list {
        display: flex;
        gap: 8px;
        overflow-x: auto;
      }
      
      .subject-item {
        padding: 8px 16px;
        border-left: none;
        border-radius: 20px;
        white-space: nowrap;
      }
      
      .subject-item.active {
        background: #0071e3;
        color: #fff;
      }
      
      .subject-count {
        display: none;
      }
      
      .content {
        padding: 20px;
      }
      
      .subject-title {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <!-- 顶部考试类型选择 -->
  <nav class="top-nav">
    <div class="exam-tabs" id="examTabs"></div>
  </nav>

  <!-- 主布局 -->
  <div class="main-layout">
    <!-- 左侧科目导航 -->
    <aside class="sidebar">
      <div class="sidebar-title">选择科目</div>
      <ul class="subject-list" id="subjectList"></ul>
    </aside>

    <!-- 右侧内容区 -->
    <main class="content">
      <!-- 科目标题 -->
      <header class="subject-header" id="subjectHeader">
        <h1 class="subject-title">全部科目</h1>
        <p class="subject-meta">共 125 道题</p>
      </header>

      <!-- 进度卡片 -->
      <div class="progress-card">
        <div class="progress-header">
          <span class="progress-title">当前进度</span>
          <span class="progress-value" id="progressText">1 / 125</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0.8%"></div>
        </div>
      </div>

      <!-- 题目卡片 -->
      <div class="question-card" id="questionCard">
        <div class="question-meta" id="questionMeta"></div>
        <div class="question-text" id="questionText">加载中...</div>
        <div class="options" id="options"></div>
        
        <!-- 解析 -->
        <div class="analysis-section" id="analysisSection" style="display: none;">
          <div class="analysis-title">💡 答案解析</div>
          <div class="analysis-content" id="analysisContent"></div>
          <div class="key-point" id="keyPoint"></div>
        </div>

        <!-- 操作按钮 -->
        <div class="actions">
          <button class="btn btn-primary" id="nextBtn">
            <span>下一题</span>
            <span>→</span>
          </button>
          <button class="btn btn-secondary" id="favoriteBtn">☆ 收藏</button>
        </div>
      </div>
    </main>
  </div>

  <!-- 底部工具栏 -->
  <div class="toolbar">
    <button class="toolbar-btn" onclick="showWrongBook()">📚 错题本</button>
    <button class="toolbar-btn" onclick="resetProgress()">↺ 重置</button>
    <button class="toolbar-btn" onclick="validateQuestions()">✓ 自检</button>
  </div>

  <script src="questions.js"></script>
  <script>
    // 数据
    const questions = window.questions || [];
    let currentExam = '全部';
    let currentSubject = '全部';
    let currentIndex = 0;
    let filteredQuestions = [];

    // 初始化
    function init() {
      if (questions.length === 0) {
        document.getElementById('questionText').textContent = '题库加载失败';
        return;
      }
      
      initExamTabs();
      filterQuestions();
      renderSubjectList();
      renderQuestion();
    }

    // 初始化考试类型标签
    function initExamTabs() {
      const exams = ['全部', ...new Set(questions.map(q => q.examType))];
      const container = document.getElementById('examTabs');
      
      container.innerHTML = exams.map(exam => `
        <button class="exam-tab ${exam === currentExam ? 'active' : ''}" 
                onclick="selectExam('${exam}')">${exam}</button>
      `).join('');
    }

    // 选择考试类型
    function selectExam(exam) {
      currentExam = exam;
      currentSubject = '全部';
      currentIndex = 0;
      initExamTabs();
      filterQuestions();
      renderSubjectList();
      renderQuestion();
    }

    // 筛选题目
    function filterQuestions() {
      filteredQuestions = questions.filter(q => {
        const matchExam = currentExam === '全部' || q.examType === currentExam;
        const matchSubject = currentSubject === '全部' || q.subject === currentSubject;
        return matchExam && matchSubject;
      });
    }

    // 渲染科目列表
    function renderSubjectList() {
      const subjects = ['全部'];
      const subjectCount = {};
      
      questions.forEach(q => {
        if (currentExam === '全部' || q.examType === currentExam) {
          if (!subjects.includes(q.subject)) {
            subjects.push(q.subject);
          }
          subjectCount[q.subject] = (subjectCount[q.subject] || 0) + 1;
        }
      });

      const container = document.getElementById('subjectList');
      container.innerHTML = subjects.map(subject => `
        <li class="subject-item ${subject === currentSubject ? 'active' : ''}" 
            onclick="selectSubject('${subject}')">
          <span class="subject-name">${subject}</span>
          ${subject !== '全部' ? `<span class="subject-count">${subjectCount[subject] || 0}题</span>` : ''}
        </li>
      `).join('');
    }

    // 选择科目
    function selectSubject(subject) {
      currentSubject = subject;
      currentIndex = 0;
      renderSubjectList();
      filterQuestions();
      renderQuestion();
    }

    // 渲染题目
    function renderQuestion() {
      if (filteredQuestions.length === 0) {
        document.getElementById('questionCard').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📚</div>
            <div class="empty-title">暂无题目</div>
            <div class="empty-desc">该科目下暂时没有题目</div>
          </div>
        `;
        return;
      }

      const q = filteredQuestions[currentIndex];
      
      // 更新标题
      document.getElementById('subjectHeader').innerHTML = `
        <h1 class="subject-title">${currentSubject === '全部' ? '全部科目' : currentSubject}</h1>
        <p class="subject-meta">${currentExam === '全部' ? '全部考试' : currentExam} · 共 ${filteredQuestions.length} 道题</p>
      `;

      // 更新进度
      document.getElementById('progressText').textContent = `${currentIndex + 1} / ${filteredQuestions.length}`;
      document.getElementById('progressFill').style.width = `${((currentIndex + 1) / filteredQuestions.length * 100)}%`;

      // 题目元信息
      document.getElementById('questionMeta').innerHTML = `
        <span class="meta-tag">ID: ${q.id}</span>
        <span class="meta-tag chapter">${q.chapter || '综合'}</span>
        ${q.year ? `<span class="meta-tag year">${q.year}年真题</span>` : ''}
        <span class="meta-tag">难度: ${'★'.repeat(q.difficulty)}</span>
      `;

      // 题目内容
      document.getElementById('questionText').textContent = q.question;

      // 选项
      const optionsHtml = q.options.map((opt, i) => `
        <button class="option-btn" onclick="selectOption(${i}, ${q.answer}, this)">
          <span class="option-letter">${String.fromCharCode(65+i)}</span>
          <span>${opt}</span>
        </button>
      `).join('');
      document.getElementById('options').innerHTML = optionsHtml;

      // 隐藏解析
      document.getElementById('analysisSection').style.display = 'none';
    }

    // 选择答案
    function selectOption(selected, correct, btn) {
      // 禁用所有选项
      document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
      
      // 标记选中
      btn.classList.add('selected');
      
      // 显示正确答案
      const buttons = document.querySelectorAll('.option-btn');
      buttons[correct].classList.add('correct');
      
      // 如果答错，标记错误
      if (selected !== correct) {
        btn.classList.add('wrong');
      }

      // 显示解析
      const q = filteredQuestions[currentIndex];
      document.getElementById('analysisSection').style.display = 'block';
      document.getElementById('analysisContent').innerHTML = `
        <p><strong>正确答案：${String.fromCharCode(65+correct)}</strong></p>
        <p style="margin-top: 12px;">${selected === correct ? '✅ 回答正确！' : '❌ 回答错误'}</p>
      `;
      document.getElementById('keyPoint').innerHTML = `<strong>考点：</strong>${q.keyPoint || '暂无解析'}`;

      // 创建粒子效果
      createParticles(event.clientX, event.clientY);
    }

    // 下一题
    document.getElementById('nextBtn').onclick = () => {
      if (filteredQuestions.length === 0) return;
      currentIndex = (currentIndex + 1) % filteredQuestions.length;
      renderQuestion();
    };

    // 收藏
    document.getElementById('favoriteBtn').onclick = function() {
      this.textContent = this.textContent.includes('☆') ? '★ 已收藏' : '☆ 收藏';
      createParticles(event.clientX, event.clientY);
    };

    // 粒子效果
    function createParticles(x, y) {
      const colors = ['#0071e3', '#42a5f5', '#34c759', '#ff9500'];
      for (let i = 0; i < 8; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.cssText = `
          width: ${Math.random() * 6 + 4}px;
          height: ${Math.random() * 6 + 4}px;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          left: ${x}px;
          top: ${y}px;
        `;
        const angle = (Math.PI * 2 * i) / 8;
        const distance = Math.random() * 60 + 30;
        particle.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
        particle.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 800);
      }
    }

    // 错题本
    function showWrongBook() {
      alert('错题本功能开发中...');
    }

    // 重置进度
    function resetProgress() {
      currentIndex = 0;
      renderQuestion();
    }

    // 题库自检
    function validateQuestions() {
      alert(`题库共有 ${questions.length} 道题，格式检查通过！`);
    }

    // 启动
    init();
  </script>
</body>
</html>
